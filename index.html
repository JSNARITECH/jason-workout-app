<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jason's Workout System</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --black:#080808; --dark:#111; --card:#181818; --card2:#1e1e1e;
  --border:#252525; --border2:#303030; --white:#f0f0ee;
  --dim:#555; --dim2:#888;
  --accent:#e8ff47; --accent-dim:rgba(232,255,71,0.10);
  --red:#ff4d4d; --red-dim:rgba(255,77,77,0.12);
  --blue:#4daaff; --blue-dim:rgba(77,170,255,0.12);
  --green:#4dffaa; --green-dim:rgba(77,255,170,0.12);
  --orange:#ff9a4d; --orange-dim:rgba(255,154,77,0.12);
  --purple:#c084fc; --purple-dim:rgba(192,132,252,0.12);
  --gold:#ffd700; --gold-dim:rgba(255,215,0,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;height:100%;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}

/* HEADER */
.hdr{background:var(--black);padding:12px 16px 0;border-bottom:1px solid var(--border);flex-shrink:0;z-index:50;}
.hdr-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px;}
.brand-sub{font-size:9px;letter-spacing:3px;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:2px;}
.brand-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;}
.hdr-right{text-align:right;}
.hdr-day{font-size:9px;color:var(--dim2);letter-spacing:2px;text-transform:uppercase;}
.hdr-wtype{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;}

/* DAY PILLS */
.day-scroll{overflow-x:auto;scrollbar-width:none;display:flex;gap:5px;padding:8px 16px;}
.day-scroll::-webkit-scrollbar{display:none;}
.day-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:7px 9px;border-radius:11px;border:1px solid var(--border);background:none;cursor:pointer;transition:all 0.2s;min-width:50px;gap:2px;}
.day-pill.active{background:var(--card2);border-color:var(--border2);}
.day-pill.today{border-color:rgba(232,255,71,0.45);}
.dp-name{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);}
.day-pill.active .dp-name{color:var(--white);}
.day-pill.today .dp-name{color:var(--accent);}
.dp-num{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--dim);line-height:1;}
.day-pill.active .dp-num,.day-pill.today .dp-num{color:var(--white);}
.dp-type{font-size:7px;letter-spacing:1px;text-transform:uppercase;font-weight:700;}
.dp-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);margin-top:2px;transition:background 0.3s;}
.day-pill.has-data .dp-dot{background:var(--green);}
.day-pill.has-pr .dp-dot{background:var(--gold);}

/* GLOBAL PROGRESS */
.g-progress{height:2px;background:var(--border);}
.g-progress-fill{height:100%;background:var(--accent);transition:width 0.4s ease;width:0%;}

/* BOTTOM NAV */
.b-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--dark);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 13px;gap:3px;background:none;border:none;cursor:pointer;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(--dim2);font-family:'DM Sans',sans-serif;transition:color 0.2s;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:17px;}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;padding:13px 13px 90px;-webkit-overflow-scrolling:touch;}
.scroll-area::-webkit-scrollbar{width:0;}

/* WORKOUT HEADER */
.w-header{margin-bottom:12px;}
.w-title{font-family:'Bebas Neue',sans-serif;font-size:25px;letter-spacing:1px;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.w-chips{display:flex;gap:5px;flex-wrap:wrap;}
.wchip{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;padding:3px 8px;border-radius:20px;font-weight:700;}
.prog-row{display:flex;align-items:center;gap:8px;margin-top:9px;}
.prog-label{font-size:10px;color:var(--dim2);width:56px;flex-shrink:0;}
.mini-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:2px;transition:width 0.4s ease;width:0%;}
.prog-pct{font-size:10px;font-weight:700;width:30px;text-align:right;}

/* GALAXY WATCH WIDGET */
.watch-widget{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:14px;}
.watch-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.watch-title::before{content:'⌚';font-size:12px;}
.watch-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.watch-field{display:flex;flex-direction:column;gap:3px;}
.wf-label{font-size:9px;color:var(--dim2);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
.wf-input{background:var(--border);border:1px solid var(--border2);border-radius:8px;color:var(--white);padding:7px 10px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;width:100%;transition:border-color 0.2s;}
.wf-input:focus{outline:none;border-color:var(--accent);}
.wf-zone{font-size:9px;font-weight:700;margin-top:2px;letter-spacing:1px;}
.zone1{color:var(--dim2);}
.zone2{color:var(--green);}
.zone3{color:var(--accent);}
.zone4{color:var(--orange);}
.zone5{color:var(--red);}
.session-timer{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--accent);}
.session-timer-label{font-size:9px;color:var(--dim2);letter-spacing:1.5px;text-transform:uppercase;}

/* ROTATION ALERT */
.rotation-alert{background:var(--purple-dim);border:1px solid rgba(192,132,252,0.3);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:none;}
.rotation-alert.visible{display:block;}
.rotation-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--purple);margin-bottom:6px;}
.rotation-body{font-size:12px;color:var(--dim2);line-height:1.5;}
.rotation-exercises{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.rotation-ex{font-size:10px;background:var(--purple-dim);border:1px solid rgba(192,132,252,0.2);color:var(--purple);padding:3px 9px;border-radius:8px;font-weight:600;cursor:pointer;}
.rotation-ex:hover,.rotation-ex:active{background:rgba(192,132,252,0.2);}
.rotation-dismiss{font-size:10px;color:var(--dim);margin-top:8px;cursor:pointer;text-decoration:underline;}

/* FORT CANCELLED BANNER */
.fort-cancel-banner{background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.25);border-radius:14px;padding:14px 15px;margin-bottom:14px;}
.fort-cancel-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.fort-cancel-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;color:var(--red);}
.fort-cancel-sub{font-size:11px;color:var(--dim2);line-height:1.4;margin-bottom:10px;}
.fort-cancel-btns{display:flex;gap:8px;}
.fort-btn{flex:1;padding:9px 10px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
.fort-btn-go{background:var(--green);color:#000;}
.fort-btn-go:active{background:#3ddda0;}
.fort-btn-fort{background:var(--border2);color:var(--dim2);}
.fort-btn-fort:active{background:var(--border);}
.fort-mode-indicator{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 10px;border-radius:8px;background:rgba(77,255,170,0.1);color:var(--green);border:1px solid rgba(77,255,170,0.2);}

/* SECTION LABEL */
.sec-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;color:var(--dim);margin:16px 0 7px;display:flex;align-items:center;gap:8px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* EXERCISE CARD */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:13px;margin-bottom:8px;overflow:hidden;transition:border-color 0.25s,opacity 0.25s;}
.ex-card.done{opacity:0.52;border-color:var(--accent);}
.ex-card.done .ex-hdr{background:rgba(232,255,71,0.04);}
.ex-card.pr-card{border-color:var(--gold)!important;}
.ex-hdr{display:flex;align-items:center;padding:11px 13px;gap:10px;cursor:pointer;}
.check-btn{width:27px;height:27px;border-radius:50%;border:2px solid var(--border2);background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all 0.2s;font-size:12px;color:transparent;}
.ex-card.done .check-btn{background:var(--accent);border-color:var(--accent);color:var(--black);}
.ex-info{flex:1;min-width:0;}
.ex-name-row{display:flex;align-items:center;gap:6px;}
.ex-name{font-weight:600;font-size:14px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:800;letter-spacing:1px;background:var(--gold-dim);color:var(--gold);padding:2px 7px;border-radius:8px;border:1px solid rgba(255,215,0,0.3);animation:prPulse 1.5s ease-in-out infinite;flex-shrink:0;}
@keyframes prPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.3)}50%{box-shadow:0 0 0 4px rgba(255,215,0,0)}}
.rotation-flag{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;letter-spacing:1px;background:var(--purple-dim);color:var(--purple);padding:2px 7px;border-radius:8px;border:1px solid rgba(192,132,252,0.25);flex-shrink:0;}
.ex-chips{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.chip{font-size:9px;padding:2px 6px;border-radius:9px;font-weight:700;}
.chip-sets{background:var(--border2);color:var(--dim2);}
.chip-reps{background:var(--accent-dim);color:var(--accent);}
.chip-pr{background:var(--green-dim);color:var(--green);}
.chip-target{background:var(--orange-dim);color:var(--orange);}
.chip-hassan{background:var(--purple-dim);color:var(--purple);}
.chip-pr-badge{background:var(--gold-dim);color:var(--gold);}
.ex-arrow{color:var(--dim);font-size:11px;transition:transform 0.2s;flex-shrink:0;}
.ex-card.expanded .ex-arrow{transform:rotate(90deg);}

/* DETAIL */
.ex-detail{display:none;padding:0 13px 13px;border-top:1px solid var(--border);}
.ex-card.expanded .ex-detail{display:block;}
.hassan-tag{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--purple);background:var(--purple-dim);padding:3px 8px;border-radius:9px;margin-top:9px;}
.ladder-display{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin:7px 0 4px;}
.ladder-step{font-size:11px;background:var(--border);border-radius:5px;padding:3px 7px;color:var(--white);font-weight:600;}
.ladder-arrow{color:var(--dim);font-size:9px;}
.burnout-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;color:var(--red);background:var(--red-dim);padding:2px 8px;border-radius:9px;font-weight:700;margin-bottom:3px;}
.set-table{width:100%;border-collapse:collapse;margin-top:9px;font-size:12px;}
.set-table th{text-align:left;color:var(--dim);font-weight:500;letter-spacing:1px;font-size:9px;text-transform:uppercase;padding:0 0 5px;border-bottom:1px solid var(--border);}
.set-table td{padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
.set-table tr:last-child td{border-bottom:none;}
.set-num{color:var(--dim);width:18px;font-weight:600;font-size:10px;}
.set-reps{color:var(--accent);font-weight:700;}
.set-rpe{color:var(--dim2);font-size:10px;}
.set-pr-cell{width:28px;}
.pr-star{display:none;font-size:14px;}
.pr-star.visible{display:inline;}
.w-input{background:var(--border);border:1px solid var(--border2);border-radius:6px;color:var(--white);padding:4px 7px;font-size:14px;font-weight:700;width:62px;text-align:center;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
.w-input:focus{outline:none;border-color:var(--accent);}
.w-input.pr{border-color:var(--gold);background:rgba(255,215,0,0.06);}
.form-cue{font-size:11px;color:var(--dim2);font-style:italic;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);line-height:1.5;}
.complete-btn{width:100%;margin-top:11px;padding:10px;border-radius:9px;border:none;background:var(--accent);color:var(--black);font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;cursor:pointer;transition:opacity 0.2s,transform 0.1s;}
.complete-btn:active{transform:scale(0.98);opacity:0.85;}
.complete-btn.done-state{background:var(--border2);color:var(--dim2);}

/* PER-SET REST BUTTONS */
.set-done-btn{background:var(--border2);border:1px solid var(--border2);color:var(--dim2);border-radius:6px;padding:3px 8px;font-size:9px;font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;white-space:nowrap;}
.set-done-btn:active{transform:scale(0.95);}
.set-done-btn.set-completed{background:var(--accent);border-color:var(--accent);color:var(--black);}

/* REST CONFIG ROW */
.rest-config{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 0;border-top:1px solid var(--border);}
.rest-config-label{font-size:9px;color:var(--dim2);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;flex-shrink:0;}
.rest-presets{display:flex;gap:4px;flex-wrap:wrap;}
.rest-preset{font-size:10px;padding:4px 9px;border-radius:7px;border:1px solid var(--border2);background:none;color:var(--dim2);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all 0.15s;}
.rest-preset.active-rest{background:var(--green-dim);border-color:rgba(77,255,170,0.4);color:var(--green);}
.rest-preset:active{transform:scale(0.95);}

/* TIMER SET INFO */
.t-set-info{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:1px;margin-bottom:4px;}
.t-type-badge{display:inline-flex;font-size:9px;padding:2px 8px;border-radius:7px;font-weight:700;letter-spacing:1px;margin-bottom:10px;}
.t-type-heavy{background:var(--red-dim);color:var(--red);}
.t-type-moderate{background:var(--orange-dim);color:var(--orange);}
.t-type-light{background:var(--green-dim);color:var(--green);}
.t-type-burnout{background:var(--purple-dim);color:var(--purple);}
/* TIMER NEXT SET TARGET */
.t-next-target{font-size:13px;font-weight:700;color:var(--white);background:var(--card2);border:1px solid var(--border2);border-radius:9px;padding:7px 12px;margin-bottom:12px;display:none;}
.t-next-target.visible{display:block;}
.t-next-target-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);font-weight:600;margin-bottom:2px;}
.t-next-target-val{color:var(--accent);}
/* CRASH RECOVERY BANNER */
.recovery-banner{background:rgba(255,154,77,0.12);border:1px solid rgba(255,154,77,0.35);border-radius:10px;padding:9px 13px;margin-bottom:12px;display:none;align-items:center;gap:9px;font-size:11px;color:var(--orange);}
.recovery-banner.visible{display:flex;}
.recovery-banner strong{color:var(--white);}
.recovery-dismiss{margin-left:auto;font-size:10px;color:var(--dim2);cursor:pointer;text-decoration:underline;flex-shrink:0;}

/* PR FLASH */
.pr-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;pointer-events:none;opacity:0;font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:2px;color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,0.6);transition:all 0.3s;}
.pr-flash.pop{opacity:1;transform:translate(-50%,-60%);}

/* COMPLETE BANNER */
.done-banner{display:none;background:var(--accent-dim);border:1px solid rgba(232,255,71,0.2);border-radius:13px;padding:18px 14px;text-align:center;margin-bottom:13px;}
.done-banner.visible{display:block;}
.done-emoji{font-size:32px;margin-bottom:7px;}
.done-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--accent);margin-bottom:3px;}
.done-sub{font-size:11px;color:var(--dim2);}

/* NOTES + SAVE */
.notes-section{margin-top:14px;}
.notes-label{font-size:9px;letter-spacing:2px;color:var(--dim2);text-transform:uppercase;font-weight:700;margin-bottom:5px;}
.notes-input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:9px;color:var(--white);padding:9px 11px;font-size:12px;font-family:'DM Sans',sans-serif;resize:none;min-height:56px;}
.notes-input:focus{outline:none;border-color:var(--accent);}
.save-btn{width:100%;margin-top:9px;padding:12px;border-radius:11px;border:none;background:var(--accent);color:var(--black);font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.save-btn:active{opacity:0.8;}
.save-btn.saved-state{background:var(--green);}
.reset-btn{display:block;width:100%;padding:9px;margin-top:9px;border-radius:9px;border:1px solid var(--border2);background:none;color:var(--dim2);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;}

/* REST DAY */
.rest-card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:26px 18px;text-align:center;margin:6px 0;}
.rest-icon{font-size:40px;margin-bottom:10px;}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:5px;}
.rest-sub{font-size:12px;color:var(--dim2);line-height:1.5;}
.rest-tips{margin-top:14px;display:flex;flex-direction:column;gap:7px;}
.rest-tip{background:var(--card2);border:1px solid var(--border2);border-radius:9px;padding:9px 12px;font-size:11px;color:var(--dim2);text-align:left;display:flex;align-items:flex-start;gap:7px;}
.rt-icon{font-size:14px;flex-shrink:0;}

/* SUMMARY VIEW */
.summary-section{padding:4px 0;}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:8px;}
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sc-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;}
.sc-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;}
.sc-exercises{display:flex;flex-direction:column;gap:4px;}
.sc-ex-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.sc-ex-row:last-child{border-bottom:none;}
.sc-ex-name{color:var(--dim2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sc-ex-weights{font-weight:700;display:flex;align-items:center;gap:4px;}
.sc-trend{font-size:10px;font-weight:700;}
.up{color:var(--green);}
.down{color:var(--red);}
.same{color:var(--dim2);}
.sc-notes{font-size:10px;color:var(--dim2);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.sc-pr-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:8px;}
.sc-pr-badge{font-size:9px;background:var(--gold-dim);color:var(--gold);padding:2px 7px;border-radius:7px;font-weight:700;}
.empty-state{text-align:center;padding:40px 16px;color:var(--dim2);font-size:12px;}

/* HISTORY SEARCH / FILTER */
.hist-toolbar{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.hist-search-wrap{position:relative;}
.hist-search{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:10px;color:var(--white);padding:9px 36px 9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;}
.hist-search:focus{outline:none;border-color:var(--accent);}

.hist-empty{text-align:center;padding:40px 20px;color:var(--dim2);}

/* HISTORY ENTRY */
.history-entry{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:8px;}

.he-right{text-align:right;flex-shrink:0;margin-left:10px;}
.he-duration{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--dim2);line-height:1;}

.he-stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}

.he-pr-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.he-notes-text{font-size:10px;color:var(--dim2);font-style:italic;margin-top:7px;padding-top:7px;border-top:1px solid var(--border);}
/* keep legacy he-notes for summary view compat */
.he-notes{font-size:10px;color:var(--dim2);font-style:italic;margin-top:7px;padding-top:7px;border-top:1px solid var(--border);}
.he-watch{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap;}
.he-watch-stat{font-size:10px;background:var(--border2);padding:2px 8px;border-radius:7px;color:var(--dim2);}
.he-watch-stat strong{color:var(--white);}

/* PROGRESS TAB */
.prog-header{margin-bottom:16px;}
.prog-kpi-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.prog-kpi-row::-webkit-scrollbar{display:none;}
.prog-kpi{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 14px;min-width:100px;}
.prog-kpi-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);margin-bottom:5px;}
.prog-kpi-val{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;}
.prog-kpi-sub{font-size:10px;color:var(--dim2);margin-top:3px;}
.prog-kpi.green .prog-kpi-val{color:var(--green);}
.prog-kpi.gold .prog-kpi-val{color:var(--gold);}
.prog-kpi.purple .prog-kpi-val{color:var(--purple);}
.prog-kpi.red .prog-kpi-val{color:var(--red);}
/* Charts */
.prog-section-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;color:var(--dim);margin:18px 0 9px;display:flex;align-items:center;gap:8px;}
.prog-section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.prog-chart-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:10px;}
.prog-chart-title{font-size:11px;font-weight:700;color:var(--white);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;}
.prog-chart-sub{font-size:10px;color:var(--dim2);margin-bottom:11px;}
.prog-chart-wrap{width:100%;overflow-x:auto;scrollbar-width:none;}
.prog-chart-wrap::-webkit-scrollbar{display:none;}
.prog-chart-wrap canvas{display:block;}
.prog-ex-selector{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;}
.prog-ex-selector::-webkit-scrollbar{display:none;}
.prog-ex-btn{flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--dim2);cursor:pointer;font-family:'DM Sans',sans-serif;}
.prog-ex-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
/* Volume bars */
.vol-bars{display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:6px;}
.vol-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.vol-bar{width:100%;border-radius:4px 4px 0 0;background:var(--accent-dim);border:1px solid var(--accent);transition:height 0.4s;}
.vol-bar.current-week{background:rgba(232,255,71,0.3);border-color:var(--accent);}
.vol-bar-label{font-size:8px;color:var(--dim2);letter-spacing:0.5px;text-align:center;white-space:nowrap;}
.vol-bar-val{font-size:8px;color:var(--dim2);text-align:center;}
/* Strength spark lines */
.spark-wrap{position:relative;height:56px;width:100%;}
.spark-wrap svg{width:100%;height:56px;}
.spark-line{fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.spark-dot{fill:var(--accent);}
.spark-dot.last{fill:var(--gold);}
.spark-labels{display:flex;justify-content:space-between;margin-top:3px;}
.spark-label{font-size:9px;color:var(--dim2);}
/* AI Insight card */
.ai-insight-card{background:var(--card);border:1px solid rgba(192,132,252,0.35);border-radius:14px;padding:16px;margin-bottom:10px;}
.ai-insight-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.ai-insight-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--purple);}
.ai-insight-meta{font-size:9px;color:var(--dim2);letter-spacing:1px;}
.ai-generate-btn{width:100%;padding:13px;border-radius:11px;border:1px solid rgba(192,132,252,0.4);background:rgba(192,132,252,0.08);color:var(--purple);font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;cursor:pointer;transition:all 0.2s;}
.ai-generate-btn:hover{background:rgba(192,132,252,0.15);}
.ai-generate-btn:disabled{opacity:0.5;cursor:not-allowed;}
.ai-loading{text-align:center;padding:20px;color:var(--dim2);}
.ai-spinner{font-size:24px;animation:spin 1s linear infinite;display:block;margin-bottom:8px;}
.ai-section{margin-bottom:14px;}
.ai-section-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:7px;}
.ai-section-label.wins{color:var(--green);}
.ai-section-label.priorities{color:var(--accent);}
.ai-section-label.plateau{color:var(--red);}
.ai-section-label.recovery{color:var(--purple);}
.ai-section-label.focus{color:var(--gold);}
.ai-item{display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--dim2);line-height:1.5;}
.ai-item-icon{flex-shrink:0;font-size:13px;}
.ai-item-text{flex:1;}
.ai-focus-banner{background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.25);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--gold);line-height:1.4;font-style:italic;}
.prog-ex-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.prog-ex-row:last-child{border-bottom:none;}
.prog-ex-name{font-size:12px;color:var(--dim2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prog-ex-right{text-align:right;flex-shrink:0;margin-left:8px;}
.prog-ex-wt{font-size:13px;font-weight:700;color:var(--white);}
.prog-ex-delta{font-size:10px;font-weight:700;}
.prog-ex-delta.up{color:var(--green);}
.prog-ex-delta.flat{color:var(--dim2);}
.prog-ex-delta.plateau{color:var(--red);}
.prog-error{background:var(--red-dim);border:1px solid rgba(255,77,77,0.3);border-radius:10px;padding:12px;font-size:12px;color:var(--red);margin-bottom:10px;}
.prog-empty{text-align:center;padding:40px 16px;color:var(--dim2);}

/* TIMER OVERLAY */
.timer-overlay{position:fixed;inset:0;background:rgba(8,8,8,0.93);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.timer-overlay.visible{opacity:1;pointer-events:all;}
.timer-overlay.minimized{inset:auto;bottom:70px;left:50%;transform:translateX(-50%);background:none;backdrop-filter:none;align-items:flex-end;justify-content:center;}
.timer-box{text-align:center;padding:32px 24px;background:var(--card);border:1px solid var(--border2);border-radius:22px;min-width:270px;max-width:310px;width:86%;}
.timer-overlay.minimized .timer-box{display:none;}
/* Minimized pill */
.timer-pill{display:none;align-items:center;gap:10px;background:var(--card);border:1px solid var(--accent);border-radius:50px;padding:8px 16px;box-shadow:0 4px 20px rgba(232,255,71,0.15);}
.timer-overlay.minimized .timer-pill{display:flex;}
.tp-ring{width:28px;height:28px;position:relative;flex-shrink:0;}
.tp-ring svg{width:28px;height:28px;transform:rotate(-90deg);}
.tp-ring-bg{fill:none;stroke:var(--border2);stroke-width:3;}
.tp-ring-fill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;stroke-dasharray:75.4;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke 0.3s;}
.tp-ring-fill.urgent{stroke:var(--red);}
.tp-secs{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--accent);line-height:1;min-width:28px;text-align:center;}
.tp-label{font-size:10px;color:var(--dim2);letter-spacing:1px;flex:1;}
.tp-expand{background:none;border:none;color:var(--dim2);font-size:16px;cursor:pointer;padding:2px 4px;}
.tp-skip{background:none;border:none;color:var(--dim);font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:'DM Sans',sans-serif;text-transform:uppercase;}
.t-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim2);margin-bottom:5px;}
.t-exname{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--accent);margin-bottom:20px;line-height:1.1;}
.t-ring-wrap{position:relative;width:140px;height:140px;margin:0 auto 17px;}
.t-ring-wrap svg{transform:rotate(-90deg);width:140px;height:140px;}
.ring-bg{fill:none;stroke:var(--border2);stroke-width:6;}
.ring-fill{fill:none;stroke:var(--green);stroke-width:6;stroke-linecap:round;stroke-dasharray:377;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke 0.3s;}
.ring-fill.urgent{stroke:var(--red);}
.t-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.t-secs{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:2px;line-height:1;}
.t-seclabel{font-size:9px;color:var(--dim2);letter-spacing:1px;}
.t-adjust{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;}
.adj-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:var(--card2);color:var(--white);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.adj-label{font-size:10px;color:var(--dim2);}
.t-next{font-size:11px;color:var(--dim2);margin-bottom:14px;}
.t-next strong{color:var(--white);}
.t-actions{display:flex;gap:8px;}
.t-btn{flex:1;padding:11px;border-radius:11px;border:none;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;}
.t-skip{background:var(--border2);color:var(--dim2);}
.t-go{background:var(--green);color:var(--black);flex:2;}

/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--green);color:var(--black);font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;padding:9px 18px;border-radius:18px;z-index:300;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.gold-toast{background:var(--gold);color:var(--black);}

/* LOADING */
.load-overlay{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:500;transition:opacity 0.5s;}
.load-overlay.hidden{opacity:0;pointer-events:none;}
.load-icon{font-size:30px;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.4;transform:scale(0.9)}50%{opacity:1;transform:scale(1.05)}}

/* COLORS */
.c-push{color:var(--orange);}.c-pull{color:var(--blue);}.c-legs{color:var(--accent);}
.c-upper{color:var(--purple);}.c-lower{color:var(--green);}.c-fort{color:var(--red);}.c-rest{color:var(--dim2);}
.bg-push{background:var(--orange-dim);}.bg-pull{background:var(--blue-dim);}.bg-legs{background:var(--accent-dim);}
.bg-upper{background:var(--purple-dim);}.bg-lower{background:var(--green-dim);}.bg-fort{background:var(--red-dim);}
.bar-push{background:var(--orange);}.bar-pull{background:var(--blue);}.bar-legs{background:var(--accent);}
.bar-upper{background:var(--purple);}.bar-lower{background:var(--green);}.bar-fort{background:var(--red);}
</style>
</head>
<body>

<div class="load-overlay" id="loadOverlay"><div class="load-icon">🏋️</div></div>
<div class="pr-flash" id="prFlash">🏆 NEW PR!</div>
<div class="toast" id="toast">✓ SAVED</div>

<div class="app">
  <div class="hdr">

      <div>
        <div class="brand-sub">Jason's System</div>
        <div class="brand-title">WORKOUT TRACKER</div>
      </div>

        <div class="hdr-day" id="hdrDay">—</div>
        <div class="hdr-wtype" id="hdrType">—</div>
      </div>
    </div>
    <div class="day-scroll" id="dayScroll"></div>
    <div class="g-progress"><div class="g-progress-fill" id="gBar"></div></div>
  </div>

  <div class="scroll-area" id="mainScroll"></div>
</div>

<div class="b-nav">
  <button class="nav-btn active" id="navWorkout" onclick="switchView('workout')"><span class="nav-icon">🏋️</span>TODAY</button>
  <button class="nav-btn" id="navSummary" onclick="switchView('summary')"><span class="nav-icon">📊</span>SUMMARY</button>
  <button class="nav-btn" id="navHistory" onclick="switchView('history')"><span class="nav-icon">📅</span>HISTORY</button>
  <button class="nav-btn" id="navProgress" onclick="switchView('progress')"><span class="nav-icon">📈</span>GAINS</button>
</div>

<!-- TIMER -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-box">
    <div class="t-label">REST TIMER <button onclick="minimizeTimer()" style="background:none;border:none;color:var(--dim2);font-size:11px;cursor:pointer;float:right;font-family:'DM Sans',sans-serif;letter-spacing:1px;text-transform:uppercase;font-weight:700;">− MIN</button></div>
    <div class="t-set-info" id="tSetInfo"></div>
    <div class="t-exname" id="tExName"></div>

      </div>

      <button class="adj-btn" onclick="adjTimer(-15)">−15</button>
      <span class="adj-label">Adjust rest</span>
      <button class="adj-btn" onclick="adjTimer(+15)">+15</button>

    <div class="t-next-target" id="tNextTarget">
      <div class="t-next-target-label">NEXT SET TARGET</div>
      <div class="t-next-target-val" id="tNextTargetVal"></div>
    </div>
    <div class="t-next" id="tNext"></div>
    <div class="t-actions">
      <button class="t-btn t-skip" onclick="closeTimer()">SKIP</button>
      <button class="t-btn t-go" onclick="closeTimer()">LET'S GO ›</button>

  </div>
  <!-- Minimized pill -->
  <div class="timer-pill" id="timerPill">
    <div class="tp-ring">
      <svg viewBox="0 0 28 28">
        <circle class="tp-ring-bg" cx="14" cy="14" r="12"/>
        <circle class="tp-ring-fill" id="pillRingFill" cx="14" cy="14" r="12"/>
      </svg>
    </div>
    <span class="tp-secs" id="pillDisplay">90</span>
    <span class="tp-label" id="pillLabel">Resting…</span>
    <button class="tp-expand" onclick="expandTimer()" title="Expand">⬆</button>
    <button class="tp-skip" onclick="closeTimer()">Done</button>
  </div>
</div>

<script>
// ============================================================
// WEEKLY SCHEDULE
// ============================================================
const WEEK = [
  { key:'mon', name:'Mon', type:'upper',  emoji:'💪', label:'UPPER' },

const ROTATION_POOLS = {

  back_fly:  ['Straight-Arm Pulldown','Rope Face Pull','Reverse Pec Deck','Low-to-High Reverse Fly'],

// ============================================================
// WORKOUTS DATABASE
// ============================================================
const WORKOUTS = {
  upper:{
    title:'UPPER DAY', emoji:'💪',
    chips:['Chest · Back · Shoulders · Arms','Hassan Protocol'],
    sections:[
      { label:'Chest', exercises:[
        { id:'u-fly', name:'Cable Low-to-High Fly', muscle:'chest',
          sets:[{wt:20,reps:'Warm'},{wt:30,reps:'FAIL'}],
          chips:{sets:'2 Sets',reps:'Pre-Exhaust',pr:'PR: 30 lbs',tag:'Hassan'},
          hassan:true, ladder:['20×warm','30×FAIL'], burnout:'Drop 20%, 20 reps',
          cue:'Start externally rotated. Pull elbows up and in. Slight internal rotation at top.' },

// SMART REST TIME DEFAULTS (seconds)
// ============================================================
// Based on exercise type, intensity, and muscle group
const REST_DEFAULTS = {
  // Heavy compound Hassan exercises (RPE 9-10, 6-10 rep range)
  heavy_hassan: 150,     // 2:30 — heavy ladder + failure needs full ATP recovery
  // Moderate compound (RPE 8-9, 8-12 rep range)
  moderate_compound: 120, // 2:00
  // Burnout sets (20 rep, metabolic)
  burnout: 90,            // 1:30 — shorter, keep metabolic stress
  // Isolation exercises (laterals, curls, pushdowns)
  isolation: 75,          // 1:15
  // Pre-exhaust / warm-up sets
  pre_exhaust: 60,        // 1:00
  // Light warm-up
  warmup: 45,             // 0:45
};

function getSmartRestTime(ex, setIdx) {
  // Check for user override first
  const overrideKey = `${ex.id}`;
  if (restOverrides[overrideKey] !== undefined) return restOverrides[overrideKey];

  const set = ex.sets[setIdx];
  if (!set) return 90;

  // Warm-up set detection
  const repsStr = String(set.reps).toLowerCase();
  if (repsStr === 'warm' || repsStr.includes('warm') || set.note === 'Warm') return REST_DEFAULTS.warmup;

  // Burnout set detection
  if (set.note === 'Burnout' || (parseInt(set.reps) >= 20 && setIdx === ex.sets.length - 1)) return REST_DEFAULTS.burnout;

  // Hassan heavy compound (main movements with ladder)
  if (ex.hassan && ex.ladder && ex.ladder.length > 0) {
    const weight = parseFloat(set.wt) || 0;
    if (weight >= 100 || repsStr === 'fail') return REST_DEFAULTS.heavy_hassan;
    return REST_DEFAULTS.moderate_compound;
  }

  // Pre-exhaust section exercises
  const muscle = (ex.muscle || '').toLowerCase();
  if (ex.sets.length <= 2 && !ex.hassan) {
    // Isolation or pre-exhaust
    if (['chest','back'].includes(muscle) && !ex.hassan) return REST_DEFAULTS.pre_exhaust;
    return REST_DEFAULTS.isolation;
  }

  // Default: compound non-Hassan
  return REST_DEFAULTS.moderate_compound;
}

function getRestTypeLabel(seconds) {
  if (seconds <= 50) return { label: 'LIGHT REST', cls: 't-type-light' };
  if (seconds <= 80) return { label: 'MODERATE REST', cls: 't-type-moderate' };
  if (seconds <= 110) return { label: 'STANDARD REST', cls: 't-type-moderate' };
  if (seconds <= 140) return { label: 'FULL RECOVERY', cls: 't-type-heavy' };
  return { label: 'HEAVY REST', cls: 't-type-heavy' };
}

async function init() {
  // Detect today's day (0=Sun,1=Mon...)
  const dow = new Date().getDay();
  const dayMap = [6,0,1,2,3,4,5]; // Sun->idx6, Mon->idx0
  currentDayIdx = dayMap[dow];

  // Load all persisted data
  await loadAll();

  buildUI();
  setTimeout(() => {
    document.getElementById('loadOverlay').classList.add('hidden');
  }, 400);
}

async function loadAll() {
  // Helper: try window.storage first, fall back to localStorage
  async function getStored(key) {
    try {
      const r = await window.storage.get(key);
      if (r?.value) return r.value;
    } catch(e) {}
    // fallback to localStorage (used by Vercel deployment)
    try { return localStorage.getItem(key); } catch(e) {}
    return null;
  }

  try { const v = await getStored('workout-history'); if (v) historyStore = JSON.parse(v); } catch(e) { historyStore = []; }
  try { const v = await getStored('pr-store'); if (v) prStore = JSON.parse(v); } catch(e) { prStore = {}; }
  try { const v = await getStored('exercise-freq'); if (v) exerciseFreq = JSON.parse(v); } catch(e) { exerciseFreq = {}; }
  try { const v = await getStored('rest-overrides'); if (v) restOverrides = JSON.parse(v); } catch(e) { restOverrides = {}; }

  // Restore fort-cancelled flag for today
  try {
    const key = `fort-cancelled-${getDateStr()}`;
    const v = await getStored(key);
    fortCancelled = !!(v);
  } catch(e) { fortCancelled = false; }

  // Fetch completed workout dates from Supabase (populates green dots on day pills)
  try {
    const HIST_API = 'https://fnjjfnsdxibjbzldfgit.supabase.co/functions/v1/workout-history?limit=200';
    const res = await fetch(HIST_API);
    const json = await res.json();
    if (json.ok && Array.isArray(json.workouts)) {
      completedDates = new Set(json.workouts.map(w => w.workout_date));
    }
  } catch(e) { /* non-fatal — dots just won't show */ }

  // Load today's session — try window.storage first, fall back to localStorage crash save
  try {
    const todayKey = `session-${getDateStr()}`;
    const r4 = await window.storage.get(todayKey);
    if (r4?.value) {
      sessionState = JSON.parse(r4.value);
    } else {
      // window.storage had nothing — check localStorage crash backup
      const crashSave = localStorage.getItem(`workout-crash-${getDateStr()}`);
      if (crashSave) {
        sessionState = JSON.parse(crashSave);
        window._sessionRestoredFromCache = true;
      }
    }
  } catch(e) {
    // window.storage failed entirely — try localStorage crash backup
    try {
      const crashSave = localStorage.getItem(`workout-crash-${getDateStr()}`);
      if (crashSave) {
        sessionState = JSON.parse(crashSave);
        window._sessionRestoredFromCache = true;
      }
    } catch(e2) { sessionState = {}; }
  }
}

function getDateStr(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().split('T')[0];
}

function getDayNum(idx) {
  const dow = new Date().getDay();
  const todayIdx = [6,0,1,2,3,4,5][dow];
  const diff = idx - todayIdx;
  const d = new Date();
  d.setDate(d.getDate() + diff);
  return d.getDate();
}

function getDayDate(idx) {
  const dow = new Date().getDay();
  const todayIdx = [6,0,1,2,3,4,5][dow];
  const diff = idx - todayIdx;
  const d = new Date();
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}

function buildDayPills() {
  const wrap = document.getElementById('dayScroll');
  wrap.innerHTML = '';
  const todayIdx = [6,0,1,2,3,4,5][new Date().getDay()];

  WEEK.forEach((day, idx) => {
    const btn = document.createElement('button');
    btn.className = 'day-pill';
    if (idx === currentDayIdx) btn.classList.add('active');
    if (idx === todayIdx) btn.classList.add('today');

    const dateStr = getDayDate(idx);
    // Use Supabase-sourced completedDates for green dots (historyStore is local only)
    const hasData = completedDates.has(dateStr) || historyStore.some(h => h.date === dateStr);
    const hasPR = historyStore.some(h => h.date === dateStr && h.newPRs && h.newPRs.length > 0);
    if (hasPR) btn.classList.add('has-pr');
    else if (hasData) btn.classList.add('has-data');

    btn.innerHTML = `
      <span class="dp-name c-${day.type}">${day.name}</span>
      <span class="dp-num">${getDayNum(idx)}</span>
      <span class="dp-type c-${day.type}">${day.label.split('/')[0].trim()}</span>
      <span class="dp-dot"></span>
    `;
    btn.onclick = () => selectDay(idx);
    wrap.appendChild(btn);
  });

  setTimeout(() => {
    const pills = wrap.querySelectorAll('.day-pill');
    if (pills[currentDayIdx]) pills[currentDayIdx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }, 80);
}

function updateHeader() {
  const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  document.getElementById('hdrDay').textContent = days[new Date().getDay()];
  document.getElementById('hdrType').textContent = WEEK[currentDayIdx].label;
}

function selectDay(idx) {
  currentDayIdx = idx;
  buildDayPills();
  if (currentView === 'workout') renderWorkoutView();
}

function switchView(view) {
  currentView = view;
  ['navWorkout','navSummary','navHistory','navProgress'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById({workout:'navWorkout',summary:'navSummary',history:'navHistory',progress:'navProgress'}[view]).classList.add('active');

function renderCurrentView() {

  else if (currentView === 'progress') renderProgressView();
}

// ============================================================
// WORKOUT VIEW
// ============================================================
function renderWorkoutView() {
  const day = WEEK[currentDayIdx];
  const scroll = document.getElementById('mainScroll');

  if (day.type === 'rest') { renderRestDay(day.key); return; }

  const workout = WORKOUTS[day.type];
  if (!workout) { scroll.innerHTML = '<div class="empty-state">No workout data for this day.</div>'; return; }

  const sectionsForProgress = (day.type === 'fort' && fortCancelled)
    ? workout.sections.filter(s => s.label !== 'If At FORT')
    : (day.type === 'fort' && !fortCancelled)
      ? workout.sections.filter(s => s.label === 'If At FORT' || s.label.includes('Ab'))
      : workout.sections;

  const allExIds = [];
  sectionsForProgress.forEach(s => s.exercises.forEach(e => allExIds.push(e.id)));

  // Check rotation alerts
  const rotationAlerts = getRotationAlerts(day.type);

  let html = '';

  // FORT cancelled banner (Tuesday only)
  if (day.type === 'fort') {
    if (fortCancelled) {
      html += `<div class="fort-cancel-banner">
        <div class="fort-cancel-top">
          <div class="fort-cancel-title">🏠 HOME LOWER DAY</div>
          <div class="fort-mode-indicator">✓ FORT CANCELLED</div>
        </div>
        <div class="fort-cancel-sub">Swapped to your full home gym lower body protocol. All the gains, none of the commute.</div>
        <div class="fort-cancel-btns">
          <button class="fort-btn fort-btn-fort" onclick="toggleFortCancelled()">↩ FORT Was On After All</button>
        </div>
      </div>`;
    } else {
      html += `<div class="fort-cancel-banner">
        <div class="fort-cancel-top">
          <div class="fort-cancel-title">📍 FORT / LOWER DAY</div>
        </div>
        <div class="fort-cancel-sub">Heading to FORT? Go get it. Class got cancelled? Hit the home gym lower body sub below.</div>
        <div class="fort-cancel-btns">
          <button class="fort-btn fort-btn-go" onclick="toggleFortCancelled()">🏠 FORT Cancelled — Home Lower Day</button>
        </div>
      </div>`;
    }
  }

  // Workout header
  html += `<div class="w-header">
    <div class="w-title"><span>${workout.emoji}</span>${fortCancelled && day.type==='fort' ? 'HOME LOWER DAY' : workout.title}</div>
    <div class="w-chips">${(fortCancelled && day.type==='fort' ? ['Home Gym Lower Body','Hassan Protocol'] : workout.chips).map(c => `<span class="wchip bg-${day.type} c-${day.type}">${c}</span>`).join('')}</div>
    <div class="prog-row">
      <span class="prog-label">Progress</span>
      <div class="mini-bar"><div class="mini-bar-fill bar-${day.type}" id="dayProg" style="width:0%"></div></div>
      <span class="prog-pct c-${day.type}" id="dayPct">0%</span>
    </div>
  </div>`;

  // Done banner
  const doneBannerTitle = (fortCancelled && day.type==='fort') ? 'HOME LOWER DAY COMPLETE' : `${workout.title} COMPLETE`;
  html += `<div class="done-banner" id="doneBanner">
    <div class="done-emoji">${workout.emoji}</div>
    <div class="done-title">${doneBannerTitle}</div>
    <div class="done-sub">Steam room time. You earned it. 🔥</div>
  </div>`;

  // Crash recovery banner (shown if session was restored from localStorage)
  html += `<div class="recovery-banner" id="recoveryBanner">
    ⚡ <span><strong>Session restored.</strong> Your data was recovered after a page reload.</span>
    <span class="recovery-dismiss" onclick="document.getElementById('recoveryBanner').classList.remove('visible')">Dismiss</span>
  </div>`;

  // Rotation alerts
  if (rotationAlerts.length > 0) {
    rotationAlerts.forEach(alert => {
      html += `<div class="rotation-alert visible" id="rot-${alert.exId}">
        <div class="rotation-title">🔄 Time to Mix It Up — ${alert.exName}</div>
        <div class="rotation-body">You've hit this exercise ${alert.count} sessions in a row without a PR increase. Your body is adapting. Try one of these variations:</div>
        <div class="rotation-exercises">
          ${alert.alternatives.map(alt => `<span class="rotation-ex" onclick="swapExercise('${alert.exId}','${alt.replace(/'/g,"\\'")}','${day.type}')">${alt}</span>`).join('')}
        </div>
        <div class="rotation-dismiss" onclick="dismissAlert('rot-${alert.exId}')">Dismiss for now</div>
      </div>`;
    });
  }

  // Galaxy Watch
  const ws = sessionState['__watch__'] || {};
  const sessionDuration = getSessionDuration();
  html += `<div class="watch-widget">
    <div class="watch-title">GALAXY WATCH — SESSION DATA</div>
    <div class="watch-fields">
      <div class="watch-field">
        <span class="wf-label">Avg HR (bpm)</span>
        <input class="wf-input" type="number" id="w-avhr" placeholder="128" value="${ws.avgHr||''}" oninput="saveWatch('avgHr',this.value)" min="50" max="220">
        <span class="wf-zone" id="zone-avg">${getHRZone(ws.avgHr||0)}</span>
      </div>
      <div class="watch-field">
        <span class="wf-label">Max HR (bpm)</span>

  const sectionsToRender = (day.type === 'fort' && fortCancelled)
    ? workout.sections.filter(s => s.label !== 'If At FORT')
    : (day.type === 'fort' && !fortCancelled)
      ? workout.sections.filter(s => s.label === 'If At FORT' || s.label.includes('Ab'))
      : workout.sections;

  sectionsToRender.forEach(section => {
    html += `<div class="sec-label">${section.label}</div>`;
    section.exercises.forEach(ex => {
      const state = sessionState[ex.id] || {};
      const isDone = state.done || false;
      const savedWeights = state.weights || ex.sets.map(s => s.wt);
      const hasPRThisSession = checkIfPR(ex.id, savedWeights);
      html += buildExCard(ex, isDone, savedWeights, hasPRThisSession, day.type);

  // Notes + Save
  const savedNotes = (sessionState['__notes__'] || {}).notes || '';
  html += `<div class="notes-section">
    <div class="notes-label">Session Notes</div>
    <textarea class="notes-input" id="sessionNotes" placeholder="How did it feel? Any PRs? Energy? Pain?" oninput="saveNotes(this.value)">${savedNotes}</textarea>
    <button class="save-btn" id="saveBtn" onclick="saveWorkout('${day.type}','${day.key}')">💾 SAVE WORKOUT TO HISTORY</button>
  </div>
  <button class="reset-btn" onclick="resetDay()">↺ Reset ${workout.title}</button>`;

  scroll.innerHTML = html;
  updateDayProgress(allExIds);
  scroll.scrollTop = 0;

  // Show recovery banner if session was restored from localStorage crash recovery
  if (window._sessionRestoredFromCache) {
    const banner = document.getElementById('recoveryBanner');
    if (banner) banner.classList.add('visible');
    window._sessionRestoredFromCache = false;
  }

  // Start session timer
  startSessionTimer();
