// ============================================================
function toggleCard(exId) {
  const card = document.getElementById(`card-${exId}`);
  card.classList.toggle('expanded');
}

function toggleDone(e, exId, type) {
  e.stopPropagation();
  const card = document.getElementById(`card-${exId}`);
  const isDone = card.classList.contains('done');
  if (isDone) {
    card.classList.remove('done');
    sessionState[exId] = { ...(sessionState[exId]||{}), done: false };
  } else {
    card.classList.add('done');
    card.classList.remove('expanded');
    sessionState[exId] = { ...(sessionState[exId]||{}), done: true, doneAt: Date.now() };
    startTimerForEx(exId, type);
  }
  saveSession();
  updateDayProgressDOM(type);
}

function completeExBtn(exId, type) {
  const card = document.getElementById(`card-${exId}`);
  if (!card.classList.contains('done')) {
    card.classList.add('done');
    card.classList.remove('expanded');
    sessionState[exId] = { ...(sessionState[exId]||{}), done: true, doneAt: Date.now() };
    const btn = document.getElementById(`btn-${exId}`);
    if (btn) { btn.textContent = '✓ COMPLETED'; btn.classList.add('done-state'); }
    saveSession();
    updateDayProgressDOM(type);
    startTimerForEx(exId, type);
  }
}

function updateWeight(exId, setIdx, val) {
  if (!sessionState[exId]) sessionState[exId] = {};
  const ex = getExById(exId);
  if (!sessionState[exId].weights) {
    sessionState[exId].weights = ex ? ex.sets.map(s => s.wt) : [];
  }
  sessionState[exId].weights[setIdx] = parseFloat(val) || 0;
  saveSession();
}

const ANALYZE_BPM_URL = 'https://fnjjfnsdxibjbzldfgit.supabase.co/functions/v1/analyze-bpm';

function toggleBpmImport() {
  const area = document.getElementById('bpmImportArea');
  area.classList.toggle('visible');
}

async function scanBpmScreenshot(input) {
  const file = input.files?.[0];
  if (!file) return;

  const btn = document.getElementById('bpmScanBtn');
  const status = document.getElementById('bpmScanStatus');

  btn.disabled = true;
  btn.textContent = '⏳ Analyzing…';
  status.textContent = 'Reading screenshot…';

  try {
    // Convert image to base64
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    status.textContent = 'Sending to Claude…';

    const res = await fetch(ANALYZE_BPM_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64, mediaType: file.type || 'image/jpeg' }),
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      throw new Error(data.error || `HTTP ${res.status}`);
    }

    // Apply the extracted data directly (reuse importWatchData logic)
    if (!sessionState['__watch__']) sessionState['__watch__'] = {};
    const w = sessionState['__watch__'];
    if (data.avgBPM)   w.avgHr      = data.avgBPM;
    if (data.maxBPM)   w.maxHr      = data.maxBPM;
    if (data.calories) w.calories   = data.calories;
    if (data.duration) w.duration   = data.duration;
    if (data.zones)    w.zones      = data.zones;
    if (data.peakTiming) w.peakTiming = data.peakTiming;
    if (data.pattern)  w.pattern    = data.pattern;
    saveSession();
    showToast('✓ BPM SCANNED');
    status.textContent = '';
    renderWorkoutView();

  } catch (e) {
    status.textContent = `❌ ${e.message}`;
    showToast('❌ Scan failed');
  } finally {
    btn.disabled = false;
    btn.textContent = '📸 Scan Samsung Health Screenshot';
    input.value = ''; // reset so same file can be re-selected
  }
}

function importWatchData() {
  const raw = (document.getElementById('bpmPasteField').value || '').trim();
  if (!raw) return;
  let data;
  try {
    // Extract JSON from Claude's response even if wrapped in text
    const match = raw.match(/\{[\s\S]*\}/);
    data = JSON.parse(match ? match[0] : raw);
  } catch(e) {
    showToast('❌ Invalid JSON');
    return;
  }
  if (!sessionState['__watch__']) sessionState['__watch__'] = {};
  const w = sessionState['__watch__'];
  if (data.avgBPM) w.avgHr = data.avgBPM;
  if (data.maxBPM) w.maxHr = data.maxBPM;
  if (data.calories) w.calories = data.calories;
  if (data.duration) w.duration = data.duration;
  if (data.zones) w.zones = data.zones;
  if (data.peakTiming) w.peakTiming = data.peakTiming;
  if (data.pattern) w.pattern = data.pattern;
  saveSession();
  showToast('✓ BPM IMPORTED');
  // Re-render the workout view to show updated widget
  const type = WEEK[currentDayIdx].type;
  renderWorkoutView();
}

function saveWatch(field, val) {
  if (!sessionState['__watch__']) sessionState['__watch__'] = {};
  sessionState['__watch__'][field] = parseFloat(val) || 0;
  if (field === 'avgHr') updateZoneLabel('zone-avg', val);
  if (field === 'maxHr') updateZoneLabel('zone-max', val);
  saveSession();
}

function updateZoneLabel(id, bpm) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = getHRZone(parseFloat(bpm) || 0);
  const cls = getHRZoneClass(parseFloat(bpm) || 0);
  el.className = 'wf-zone ' + cls;
}

function getHRZone(bpm) {
  if (!bpm || bpm < 50) return '';
  if (bpm < 108) return 'Zone 1 — Too Easy';
  if (bpm < 128) return '✓ Zone 2 — Fat Burn';
  if (bpm < 140) return '✓ Zone 3 — Aerobic';
  if (bpm < 155) return 'Zone 4 — Threshold';
  return 'Zone 5 — Peak';
}

function getHRZoneClass(bpm) {
  if (!bpm) return '';
  if (bpm < 108) return 'zone1';
  if (bpm < 128) return 'zone2';
  if (bpm < 140) return 'zone3';
  if (bpm < 155) return 'zone4';
  return 'zone5';
}

function getExById(id) {
  for (const t in WORKOUTS) {
    for (const s of WORKOUTS[t].sections) {
      const ex = s.exercises.find(e => e.id === id);
      if (ex) return ex;
    }
  }
  return null;
}

function startTimerForEx(exId, type) {
  const workout = WORKOUTS[type];
  if (!workout) return;
  const allExes = workout.sections.flatMap(s => s.exercises);
  let exName = '', nextName = null, ex = null;
  for (const e of allExes) {
    if (e.id === exId) { exName = e.name; ex = e; }
  }
  // Find next INCOMPLETE exercise
  let foundCurrent = false;
  for (const e of allExes) {
    if (e.id === exId) { foundCurrent = true; continue; }
    if (foundCurrent && !sessionState[e.id]?.done) { nextName = e.name; break; }
  }
  // If none after, check before
  if (!nextName) {
    for (const e of allExes) {
      if (e.id !== exId && !sessionState[e.id]?.done) { nextName = e.name; break; }
    }
  }
  const protocol = ex?.hassan ? 'Hassan Protocol' : 'Straight Sets';
  const totalSets = ex?.sets?.length || 0;
  const setInfo = `All sets complete · ${totalSets} sets · ${protocol}`;
  startTimer(exName, nextName, 90, setInfo, null, null);
}

// ============================================================
// PER-SET COMPLETION + SMART REST
// ============================================================
function completeSet(exId, setIdx, type) {
  const btn = document.getElementById(`setbtn-${exId}-${setIdx}`);
  if (!sessionState[exId]) sessionState[exId] = {};
  if (!sessionState[exId].setsDone) sessionState[exId].setsDone = {};
  
  const alreadyDone = sessionState[exId].setsDone[setIdx];
  if (alreadyDone) {
    // Toggle off
    sessionState[exId].setsDone[setIdx] = false;
    if (btn) { btn.textContent = 'REST'; btn.classList.remove('set-completed'); }
    saveSession();
    return;
  }

  // Mark set done
  sessionState[exId].setsDone[setIdx] = true;
  if (btn) { btn.textContent = '✓'; btn.classList.add('set-completed'); }
  saveSession();

  // Get exercise data and smart rest time
  const ex = getExById(exId);
  if (!ex) return;

  const restTime = restOverrides[exId] || getSmartRestTime(ex, setIdx);
  const set = ex.sets[setIdx];
  const setLabel = set?.note || `Set ${setIdx + 1}`;
  const nextSetIdx = setIdx + 1;
  const hasNextSet = nextSetIdx < ex.sets.length;

  // Determine next info and next set target
  let nextInfo = '';
  let nextTargetText = null;
  if (hasNextSet) {
    const nextSet = ex.sets[nextSetIdx];
    const nextLabel = nextSet.note || `Set ${nextSetIdx + 1}`;
    const nextReps = nextSet.reps;
    // Get the current logged weight for the next set (or fallback to default)
    const nextWeight = sessionState[exId]?.weights?.[nextSetIdx] ?? nextSet.wt;
    nextInfo = `Next: <strong>${ex.name} — ${nextLabel}</strong>`;
    // Build next target pill
    const protocolTag = ex.hassan ? 'Hassan' : 'Straight';
    const burnoutTag = (nextSet.note === 'Burnout' || String(nextReps).toLowerCase().includes('burn')) ? ' · Burnout' : '';
    nextTargetText = `${nextWeight} lbs · ${nextReps} reps · ${protocolTag}${burnoutTag}`;
  } else {
    // Find next INCOMPLETE exercise (respects out-of-order completion)
    const workout = WORKOUTS[type];
    if (workout) {
      const allExes = workout.sections.flatMap(s => s.exercises);
      let foundCurrent = false;
      // First pass: look for next incomplete exercise AFTER current
      for (const e of allExes) {
        if (e.id === exId) { foundCurrent = true; continue; }
        if (foundCurrent && !sessionState[e.id]?.done) {
          nextInfo = `Up next: <strong>${e.name}</strong>`;
          break;
        }
      }
      // If all remaining are done, look for ANY incomplete exercise
      if (!nextInfo) {
        for (const e of allExes) {
          if (e.id !== exId && !sessionState[e.id]?.done) {
            nextInfo = `Up next: <strong>${e.name}</strong>`;
            break;
          }
        }
      }
      if (!nextInfo) nextInfo = `<strong>Last set — finish strong!</strong>`;
    }
  }

  // Check if all sets done → auto-complete exercise
  const allSetsDone = ex.sets.every((_, i) => sessionState[exId]?.setsDone?.[i]);
  if (allSetsDone) {
    const card = document.getElementById(`card-${exId}`);
    if (card && !card.classList.contains('done')) {
      card.classList.add('done');
      card.classList.remove('expanded');
      sessionState[exId].done = true;
      const completeBtn = document.getElementById(`btn-${exId}`);
      if (completeBtn) { completeBtn.textContent = '✓ COMPLETED'; completeBtn.classList.add('done-state'); }
      saveSession();
      updateDayProgressDOM(type);
    }
  }

  const protocol = ex.hassan ? 'Hassan' : 'Straight Sets';
  const burnoutLabel = (set.note === 'Burnout') ? ' · Burnout' : '';
  const setInfoLine = `${setLabel} of ${ex.sets.length} · ${protocol}${burnoutLabel}`;
  startTimer(ex.name, null, restTime, setInfoLine, nextInfo, nextTargetText);
}

async function setRestOverride(exId, seconds) {
  restOverrides[exId] = seconds;
  try { await window.storage.set('rest-overrides', JSON.stringify(restOverrides)); } catch(e){}
  
  // Update active state on buttons
  const presetBtns = document.querySelectorAll(`[onclick*="setRestOverride('${exId}'"]`);
  presetBtns.forEach(btn => {
    const btnSec = parseInt(btn.getAttribute('onclick').match(/,(\d+)\)/)?.[1] || 0);
    btn.classList.toggle('active-rest', btnSec === seconds);
  });
  
  showToast(`⏱️ ${exId.split('-').pop().toUpperCase()} rest: ${seconds}s`);
}

// ============================================================
// SESSION TIMER
// ============================================================
function startSessionTimer() {
  if (!sessionStart) {
    const stored = sessionState['__sessionStart__'];
    // Discard if older than 24 hours — stale from a previous day
    if (stored && (Date.now() - stored) < 86400000) {
      sessionStart = stored;
    } else {
      sessionStart = Date.now();
      sessionState['__sessionStart__'] = sessionStart;
      saveSession();
    }
  }
  clearInterval(sessionTimerInterval);
  sessionTimerInterval = setInterval(() => {
    const el = document.getElementById('sessionTimer');
    if (el) el.textContent = getSessionDuration();
  }, 1000);
}

function getSessionDuration() {
  const start = sessionStart || (sessionState['__sessionStart__']);
  if (!start) return '0:00';
  const elapsed = Math.floor((Date.now() - start) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

// ============================================================
// PROGRESS
// ============================================================
function updateDayProgressDOM(type) {
  const workout = WORKOUTS[type];
  if (!workout) return;
  const ids = workout.sections.flatMap(s => s.exercises.map(e => e.id));
  updateDayProgress(ids);
}

function updateDayProgress(allExIds) {
  const done = allExIds.filter(id => (sessionState[id]||{}).done).length;
  const pct = allExIds.length > 0 ? Math.round((done / allExIds.length) * 100) : 0;
  const bar = document.getElementById('dayProg');
  const pctEl = document.getElementById('dayPct');
  const banner = document.getElementById('doneBanner');
  if (bar) bar.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (banner) banner.classList.toggle('visible', done === allExIds.length && allExIds.length > 0);
  document.getElementById('gBar').style.width = pct + '%';
}

// ============================================================
// SAVE WORKOUT
// ============================================================
async function saveWorkout(type, dayKey) {
  // Recovery mode uses RECOVERY_WORKOUTS instead of WORKOUTS
  const workout = (type === 'recovery' && dayKey && RECOVERY_WORKOUTS[dayKey])
    ? RECOVERY_WORKOUTS[dayKey]
    : WORKOUTS[type];
  if (!workout) return;

  const exercises = [];
  let newPRs = [];

  // Use sections that are currently rendered (respects fort cancelled state)
  const sectionsToSave = (type === 'fort' && fortCancelled)
    ? workout.sections.filter(s => s.label !== 'If At FORT')
    : (type === 'fort' && !fortCancelled)
      ? workout.sections.filter(s => s.label === 'If At FORT' || s.label.includes('Ab'))
      : workout.sections;

  for (const section of sectionsToSave) {
    for (const ex of section.exercises) {
      const state = sessionState[ex.id] || {};
      const weights = state.weights || ex.sets.map(s => s.wt);
      const isNewPR = await updatePRStore(ex.id, weights);
      if (isNewPR) {
        newPRs.push({ exId: ex.id, exName: ex.name, weight: Math.max(...weights) });
      }
      if (state.done) {
        exerciseFreq[ex.id] = (exerciseFreq[ex.id] || 0) + 1;
      }
      exercises.push({
        name: ex.name, muscle: ex.muscle,
        done: state.done || false,
        sets: ex.sets.map((s, i) => ({ weight: weights[i] || s.wt, reps: s.reps }))
      });
    }
  }

  const watch = sessionState['__watch__'] || {};
  const entry = {
    id: Date.now(), date: getDateStr(), dayKey,
    type, title: (type === 'fort' && fortCancelled) ? 'HOME LOWER DAY' : workout.title,
    emoji: workout.emoji,
    exercises, newPRs,
    notes: (sessionState['__notes__']||{}).notes || '',
    watch: { avgHr: watch.avgHr||null, maxHr: watch.maxHr||null, calories: watch.calories||null, zones: watch.zones||null, peakTiming: watch.peakTiming||null, pattern: watch.pattern||null },
    duration: getSessionDuration(),
    savedAt: new Date().toISOString()
  };

  historyStore.unshift(entry);
  if (historyStore.length > 100) historyStore = historyStore.slice(0, 100);

  // Try all storage layers — at least one must succeed
  let saved = false;

  // Layer 1: localStorage (always available on Vercel)
  try {
    localStorage.setItem('workout-history', JSON.stringify(historyStore));
    localStorage.setItem('pr-store', JSON.stringify(prStore));
    localStorage.setItem('exercise-freq', JSON.stringify(exerciseFreq));
    saved = true;
  } catch(e) { console.warn('localStorage save failed', e); }

  // Layer 2: window.storage (works inside Claude artifact iframe)
  try {
    await window.storage.set('workout-history', JSON.stringify(historyStore));
    await window.storage.set('pr-store', JSON.stringify(prStore));
    await window.storage.set('exercise-freq', JSON.stringify(exerciseFreq));
    saved = true;
  } catch(e) { /* silent — not in Claude context */ }

  if (saved) {
    if (newPRs.length > 0) {
      showPRFlash();
      showToast(`🏆 ${newPRs.length} NEW PR${newPRs.length>1?'s':''}! Saved — ready for Claude Chat`);
    } else {
      showToast(`✅ ${entry.title} saved · ${getDateStr()} · ready for Claude Chat`);
    }
    const btn = document.getElementById('saveBtn');
    if (btn) { btn.textContent = '✓ SAVED'; btn.style.background = '#2a3d00'; btn.style.color = 'var(--accent)'; }
    invalidateHistoryCache();
    invalidateProgressCache();
    buildDayPills();
  } else {
    alert('Save failed — storage unavailable.');
  }
}

// ── SESSION SUMMARY SHARE (Build 4) ─────────────────────────
function generateSessionSummary(type) {
  const day = WEEK[currentDayIdx];
  const workout = (type === 'recovery' && day && RECOVERY_WORKOUTS[day.key])
    ? RECOVERY_WORKOUTS[day.key]
    : WORKOUTS[type];
  if (!workout) return '';
  const watch = sessionState['__watch__'] || {};
  const date  = new Date().toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric', year:'numeric' });
  const dur   = getSessionDuration ? getSessionDuration() : '';

  let lines = [];
  lines.push(`${type === 'recovery' ? '🦴 RECOVERY SESSION' : '🏋🏾 WORKOUT COMPLETE'} — ${APP_VERSION}`);
  lines.push(`${workout.title} · ${date}${dur ? ' · ' + dur : ''}`);
  lines.push('');
  lines.push(type === 'recovery' ? '🏥 REHAB EXERCISES' : '💪 EXERCISES');

  const sections = (type === 'fort' && fortCancelled)
    ? workout.sections.filter(s => s.label !== 'If At FORT')
    : workout.sections;

  sections.forEach(section => {
    section.exercises.forEach(ex => {
      const state   = sessionState[ex.id] || {};
      const weights = state.weights || ex.sets.map(s => s.wt);
      const displayName = swapOverrides[ex.id] || ex.name;
      const setStr  = ex.sets.map((s, i) => `${weights[i] || s.wt}×${s.reps}`).join(', ');
      const done    = state.done ? '✓' : '–';
      const note    = notesStore[ex.id]?.todayNote ? ` [${notesStore[ex.id].todayNote}]` : '';
      lines.push(`${done} ${displayName}: ${setStr}${note}`);
    });
  });

  if (watch.avgHr || watch.calories) {
    lines.push('');
    lines.push('⌚ GALAXY WATCH');
    const w = [];
    if (watch.avgHr)   w.push(`Avg HR: ${watch.avgHr} bpm`);
    if (watch.maxHr)   w.push(`Max: ${watch.maxHr} bpm`);
    if (watch.calories) w.push(`Calories: ${watch.calories}`);
    lines.push(w.join(' · '));
  }

  const sessionNotes = (sessionState['__notes__'] || {}).notes;
  if (sessionNotes) {
    lines.push('');
    lines.push(`📝 Notes: ${sessionNotes}`);
  }

  lines.push('');
  lines.push('---');
  lines.push('Paste into Claude Chat → "Analyze this workout"');
  return lines.join('\n');
}

function shareToClaudeChat(type) {
  const text = generateSessionSummary(type);
  if (navigator.share) {
    navigator.share({ title: `Workout Summary ${APP_VERSION}`, text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('📋 Copied — paste into Claude Chat'));
  }
}

async function saveExerciseNote(exId, exName, type) {
  const textarea = document.getElementById(`note-${exId}`);
  if (!textarea) return;
  const note = textarea.value.trim();
  if (!notesStore[exId]) notesStore[exId] = { todayNote:'', lastWeekNote:'', weekCount:0 };
  notesStore[exId].todayNote = note;
  if (!note) return; // don't write empty rows
  try {
    await fetch(
      `${SUPABASE_URL}/rest/v1/exercise_notes?on_conflict=exercise_id,note_date`,
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          apikey: SUPABASE_ANON,
          Authorization: `Bearer ${SUPABASE_ANON}`,
          Prefer: 'resolution=merge-duplicates',
        },
        body: JSON.stringify({
          exercise_id:   exId,
          exercise_name: exName,
          workout_type:  type,
          note_date:     getDateStr(),
          note:          note,
          updated_at:    new Date().toISOString(),
        }),
      }
    );
  } catch(e) { /* non-fatal — note saved in notesStore in-memory */ }
}

async function saveSession() {
  const dateKey = getDateStr();
  const payload = JSON.stringify(sessionState);
  // Fast synchronous crash-safe backup to localStorage
  try { localStorage.setItem(`workout-crash-${dateKey}`, payload); } catch(e) {}
  // Async durable save to window.storage
  try {
    await window.storage.set(`session-${dateKey}`, payload);
  } catch(e) {}
}

function resetDay() {
  sessionState = {};
  sessionStart = null;
  clearInterval(sessionTimerInterval);
  saveSession();
  renderWorkoutView();
}

function saveNotes(val) {
  if (!sessionState['__notes__']) sessionState['__notes__'] = {};
  sessionState['__notes__'].notes = val;
  saveSession();
}

// ============================================================
// SUMMARY VIEW
// ============================================================
function renderSummaryView() {
  const scroll = document.getElementById('mainScroll');

  if (historyStore.length === 0) {
    scroll.innerHTML = `<div class="empty-state" style="margin-top:40px">
      <div style="font-size:40px;margin-bottom:10px">📊</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:6px">No Data Yet</div>
      <div>Complete your first workout to see summaries here.</div>
    </div>`;
    return;
  }

  // Build per-exercise PR summary

    const ex = getExById(id);
    return { id, name: ex?.name || id, weight: data.weight, date: data.date };
  }).filter(e => e.weight > 0).sort((a,b) => b.weight - a.weight);

  // Last 4 workouts per type
  const recentByType = {};
  historyStore.slice(0, 20).forEach(h => {
    if (!recentByType[h.type]) recentByType[h.type] = [];
    if (recentByType[h.type].length < 2) recentByType[h.type].push(h);
  });

  let html = `<div class="summary-section">`;

  // PR Board
  if (prEntries.length > 0) {
    html += `<div class="sec-label">Personal Records 🏆</div>
    <div class="summary-card">
      <div class="sc-exercises">`;
    prEntries.slice(0,10).forEach(pr => {
      html += `<div class="sc-ex-row">
        <span class="sc-ex-name">${pr.name}</span>
        <span class="sc-ex-weights"><strong>${pr.weight} lbs</strong> <span style="font-size:9px;color:var(--dim2)">${formatDate(pr.date)}</span></span>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Recent week summary
  html += `<div class="sec-label">Recent Sessions</div>`;

  ['upper','push','pull','legs','fort'].forEach(type => {
    const sessions = recentByType[type];
    if (!sessions || sessions.length === 0) return;
    const cur = sessions[0];
    const prev = sessions[1];

    html += `<div class="summary-card">
      <div class="sc-header">
        <span class="sc-title">${cur.emoji} ${cur.title}</span>
        <span class="sc-badge bg-${type} c-${type}">${formatDate(cur.date)}</span>
      </div>`;

    if (cur.watch?.avgHr || cur.watch?.calories) {
      html += `<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">`;
      if (cur.watch.avgHr) html += `<span style="font-size:10px;background:var(--border2);padding:2px 8px;border-radius:7px;color:var(--dim2)">❤️ <strong style="color:var(--white)">${cur.watch.avgHr}</strong> bpm avg</span>`;
      if (cur.watch.maxHr) html += `<span style="font-size:10px;background:var(--border2);padding:2px 8px;border-radius:7px;color:var(--dim2)">⚡ <strong style="color:var(--white)">${cur.watch.maxHr}</strong> bpm max</span>`;
      if (cur.watch.calories) html += `<span style="font-size:10px;background:var(--border2);padding:2px 8px;border-radius:7px;color:var(--dim2)">🔥 <strong style="color:var(--white)">${cur.watch.calories}</strong> kcal</span>`;
      if (cur.duration) html += `<span style="font-size:10px;background:var(--border2);padding:2px 8px;border-radius:7px;color:var(--dim2)">⏱️ <strong style="color:var(--white)">${cur.duration}</strong></span>`;
      html += `</div>`;

      // Zone distribution bars
      if (cur.watch.zones) {
        const z = cur.watch.zones;
        html += `<div class="zone-bars" style="margin-bottom:10px;">
          <div class="zone-bars-title">Heart Rate Zones</div>
          ${[['Zone 5 Max','z5','z5-fill'],['Zone 4 Hard','z4','z4-fill'],['Zone 3 Aerobic','z3','z3-fill'],['Zone 2 Fat Burn','z2','z2-fill'],['Zone 1 Easy','z1','z1-fill']].map(([n,k,cls]) =>
            `<div class="zone-bar-row"><span class="zone-bar-name">${n}</span><div class="zone-bar-track"><div class="zone-bar-fill ${cls}" style="width:${z[k]||0}%"></div></div><span class="zone-bar-pct">${z[k]||0}%</span></div>`
          ).join('')}
        </div>`;
      }

      // BPM intensity insight
      if (cur.watch.avgHr) {
        const avg = cur.watch.avgHr;
        const max = cur.watch.maxHr || 0;
        const prevSame = prev?.watch?.avgHr;
        let insight = '';
        if (avg < 108) insight = 'Very light session — BPM stayed low. Consider pushing the intensity or weights.';
        else if (avg < 120) insight = `Solid fat-burn zone — avg ${avg} bpm keeps you in Zone 2 for visceral fat oxidation.`;
        else if (avg < 130) insight = `Good aerobic effort — avg ${avg} bpm. Mix of Zone 2–3 is great for body composition.`;
        else if (avg < 140) insight = `High intensity session — avg ${avg} bpm. Excellent metabolic stimulus.`;
        else insight = `Max effort — avg ${avg} bpm. This contributes directly to your 90-min/week HIIT threshold.`;
        if (max >= 155) insight += ` Peak hit Zone 4-5 (${max} bpm) — visceral fat protocol activated.`;
        if (prevSame) {
          const delta = avg - prevSame;
          if (delta > 5) insight += ` <strong>↑${delta} bpm harder than last ${cur.title.toLowerCase()}.</strong>`;
          else if (delta < -5) insight += ` <strong>↓${Math.abs(delta)} bpm easier than last ${cur.title.toLowerCase()} — weights may need adjusting.</strong>`;
        }
        html += `<div class="bpm-insight">${insight}</div>`;
      }
    }

    const doneExes = cur.exercises.filter(e => e.done);
    html += `<div class="sc-exercises">`;
    doneExes.slice(0,5).forEach(ex => {
      const topWt = Math.max(...ex.sets.map(s => parseFloat(s.weight)||0));
      let trend = '';
      if (prev) {
        const prevEx = prev.exercises.find(e => e.name === ex.name);
        if (prevEx) {
          const prevTop = Math.max(...prevEx.sets.map(s => parseFloat(s.weight)||0));
          if (topWt > prevTop) trend = `<span class="sc-trend up">↑${topWt-prevTop}lbs</span>`;
          else if (topWt < prevTop) trend = `<span class="sc-trend down">↓${prevTop-topWt}lbs</span>`;
          else trend = `<span class="sc-trend same">→</span>`;
        }
      }
      html += `<div class="sc-ex-row">
        <span class="sc-ex-name">${ex.name}</span>
        <span class="sc-ex-weights">${topWt > 0 ? topWt + ' lbs' : '—'} ${trend}</span>
      </div>`;
    });
    html += `</div>`;

    if (cur.newPRs?.length > 0) {
      html += `<div class="sc-pr-row">`;
      cur.newPRs.forEach(pr => html += `<span class="sc-pr-badge">🏆 ${pr.exName}: ${pr.weight}lbs</span>`);
      html += `</div>`;
    }

    if (cur.notes) html += `<div class="sc-notes">"${cur.notes}"</div>`;
    html += `</div>`;
  });

  // Frequency flags
  const rotationExes = Object.entries(exerciseFreq).filter(([,c]) => c >= 3);
  if (rotationExes.length > 0) {
    html += `<div class="sec-label">Rotation Flags 🔄</div>
    <div class="summary-card">
      <div class="sc-exercises">`;
    rotationExes.forEach(([id, count]) => {
      const ex = getExById(id);
      if (!ex) return;
      const muscle = ex.muscle || 'unknown';
      const pool = ROTATION_POOLS[muscle] || [];
      const alt = pool.find(a => a.name !== ex.name)?.name || '';
      html += `<div class="sc-ex-row">
        <span class="sc-ex-name">${ex.name} <span style="color:var(--dim);font-size:10px">(${count} sessions)</span></span>
        <span style="font-size:10px;color:var(--purple)">Try: ${alt || 'See rotation pool'}</span>
      </div>`;
    });
    html += `</div></div>`;
  }

  html += `</div>`;
  scroll.innerHTML = html;
  scroll.scrollTop = 0;
}

// HISTORY VIEW — Live query from Supabase Edge Function
// ============================================================
const HISTORY_API = 'https://fnjjfnsdxibjbzldfgit.supabase.co/functions/v1/workout-history';
const WORKOUT_EMOJIS = { legs:'🦵', push:'🔥', pull:'💙', upper:'💪', lower:'🟢', fort:'🏙️', cardio:'🏃', arms:'💪', 'full body':'⚡' };
const WORKOUT_LABELS_H = { legs:'Legs', push:'Push Day', pull:'Pull Day', upper:'Upper Day', lower:'Lower Day', fort:'FORT / Lower', cardio:'Cardio', arms:'Arms', 'full body':'Full Body' };

let historyCache = null;       // full data from API
let historyFilter = 'all';     // current type filter
let historySearch = '';        // current search term
let historyLoading = false;

async function renderHistoryView() {
  const scroll = document.getElementById('mainScroll');

  // Render shell with toolbar immediately
  scroll.innerHTML = `
    <div class="hist-toolbar">
      <div class="hist-search-wrap">
        <input class="hist-search" id="histSearch" type="text" placeholder="Search exercise (e.g. leg extension)…"
          value="${historySearch}"
          oninput="onHistorySearch(this.value)">
        <button class="hist-search-clear ${historySearch ? 'visible' : ''}" id="histClear" onclick="clearHistorySearch()">✕</button>
      </div>
      <div class="hist-filter-row" id="histFilters">
        ${['all','legs','push','pull','upper','fort','cardio'].map(f =>
          `<button class="hf-btn ${historyFilter===f?'active':''}" onclick="setHistoryFilter('${f}')">${f==='all'?'All':WORKOUT_LABELS_H[f]||f}</button>`
        ).join('')}
      </div>
    </div>
    <div id="histContent"></div>`;

  scroll.scrollTop = 0;

  // Use cache if available and no new fetch needed
  if (historyCache) {
    renderHistoryContent(historyCache);
    return;
  }

  await fetchAndRenderHistory();
}

async function fetchAndRenderHistory() {
  if (historyLoading) return;
  historyLoading = true;
  const content = document.getElementById('histContent');
  if (content) content.innerHTML = `<div class="hist-loading"><span class="hist-spinner">⏳</span>Loading your history…</div>`;

  try {
    const res = await fetch(`${HISTORY_API}?limit=200`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'API error');
    historyCache = json.workouts || [];
    renderHistoryContent(historyCache);
  } catch(e) {
    const content = document.getElementById('histContent');
    if (content) content.innerHTML = `<div class="hist-error">⚠️ Could not load history: ${e.message}<br><br><button onclick="fetchAndRenderHistory()" style="margin-top:8px;padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--white);cursor:pointer;font-family:'DM Sans',sans-serif">Retry</button></div>`;
  } finally {
    historyLoading = false;
  }
}

function renderHistoryContent(allWorkouts) {
  const content = document.getElementById('histContent');
  if (!content) return;

  // Apply type filter
  let filtered = historyFilter === 'all'
    ? allWorkouts
    : allWorkouts.filter(w => w.workout_type === historyFilter);

  // Apply search
  const term = historySearch.trim().toLowerCase();
  if (term) {
    filtered = filtered.filter(w =>
      Array.isArray(w.exercises) && w.exercises.some(ex => ex?.name?.toLowerCase().includes(term))
    );
  }

  if (filtered.length === 0) {
    content.innerHTML = `<div class="hist-empty">
      <div style="font-size:36px;margin-bottom:10px">🔍</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:6px;color:var(--white)">No Results</div>
      <div style="font-size:12px">Try a different filter or search term.</div>
    </div>`;
    return;
  }

  // Group by month
  const byMonth = {};
  filtered.forEach(w => {
    const d = new Date(w.workout_date + 'T12:00:00');
    const key = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    if (!byMonth[key]) byMonth[key] = [];
    byMonth[key].push(w);
  });

  let html = `<div class="hist-meta">${filtered.length} SESSION${filtered.length!==1?'S':''} ${term ? `· matching "${term}"` : ''}</div>`;

  Object.entries(byMonth).forEach(([month, workouts]) => {
    html += `<div class="hist-month">${month}</div>`;
    workouts.forEach(w => {
      html += buildHistoryCard(w, term);
    });
  });

  content.innerHTML = html;
}

function buildHistoryCard(w, searchTerm) {
  const type = w.workout_type || 'workout';
  const emoji = WORKOUT_EMOJIS[type] || '🏋️';
  const label = WORKOUT_LABELS_H[type] || type.toUpperCase();
  const d = new Date(w.workout_date + 'T12:00:00');
  const dateStr = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

  const exercises = Array.isArray(w.exercises) ? w.exercises : [];
  const hasPR = w.session_notes && w.session_notes.toLowerCase().includes('pr');

  let statsHtml = '';
  if (w.avg_heart_rate) statsHtml += `<span class="he-stat">❤️ <strong>${w.avg_heart_rate}</strong> bpm avg</span>`;
  if (w.max_heart_rate) statsHtml += `<span class="he-stat">⚡ <strong>${w.max_heart_rate}</strong> max</span>`;
  if (w.calories_burned) statsHtml += `<span class="he-stat">🔥 <strong>${w.calories_burned}</strong> kcal</span>`;
  if (w.body_weight) statsHtml += `<span class="he-stat">⚖️ <strong>${w.body_weight}</strong> lbs</span>`;

  let exHtml = '';
  const displayExes = exercises.slice(0, 5);
  displayExes.forEach(ex => {
    if (!ex || !ex.name) return;
    const isMatch = searchTerm && ex.name.toLowerCase().includes(searchTerm);
    // Get top weight: handle straight sets, hassan, ladder
    let topWt = 0;
    if (Array.isArray(ex.sets)) {
      topWt = ex.sets.reduce((m, s) => Math.max(m, parseFloat(s?.weight)||0), 0);
    } else if (ex.failureWeight) {
      topWt = parseFloat(ex.failureWeight) || 0;
    } else if (Array.isArray(ex.ladderSets)) {
      topWt = ex.ladderSets.reduce((m, s) => Math.max(m, parseFloat(s?.weight)||0), 0);
    } else if (ex.weight) {
      topWt = parseFloat(ex.weight) || 0;
    }
    const hassan = ex.type === 'hassan' ? ' <span style="font-size:8px;color:var(--purple)">⚡H</span>' : '';
    exHtml += `<div class="he-ex-row">
      <span class="he-ex-name ${isMatch?'matched':''}">${ex.name}${hassan}</span>
      <span class="he-ex-wt">${topWt > 0 ? topWt + ' lbs' : '—'}</span>
    </div>`;
  });
  if (exercises.length > 5) {
    exHtml += `<div class="he-ex-row"><span class="he-ex-name" style="font-style:italic;color:var(--dim)">+${exercises.length-5} more</span><span class="he-ex-wt"></span></div>`;
  }

  const notesHtml = w.session_notes
    ? `<div class="he-notes-text">${w.session_notes.slice(0, 120)}${w.session_notes.length > 120 ? '…' : ''}</div>`
    : '';

  return `<div class="history-entry ${hasPR?'has-pr':''}">
    <div class="he-top">
      <div class="he-left">
        <div class="he-date">${dateStr}</div>
        <div class="he-type c-${type}">${emoji} ${label}</div>
        <div class="he-loc">📍 ${w.location || 'Home Gym'}</div>
      </div>
      <div class="he-right">
        ${w.duration_minutes ? `<div class="he-duration">${w.duration_minutes}<span style="font-size:11px">m</span></div>` : ''}
        ${w.calories_burned ? `<div class="he-cals">${w.calories_burned} kcal</div>` : ''}
      </div>
    </div>
    ${statsHtml ? `<div class="he-stats">${statsHtml}</div>` : ''}
    <div class="he-exercises">${exHtml}</div>
    ${notesHtml}
  </div>`;
}

function setHistoryFilter(f) {
  historyFilter = f;
  // Update button states
  document.querySelectorAll('.hf-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === (f === 'all' ? 'all' : (WORKOUT_LABELS_H[f]||f).toLowerCase()));
  });
  if (historyCache) renderHistoryContent(historyCache);
}

function onHistorySearch(val) {
  historySearch = val;
  const clearBtn = document.getElementById('histClear');
  if (clearBtn) clearBtn.classList.toggle('visible', val.length > 0);
  if (historyCache) renderHistoryContent(historyCache);
}

function clearHistorySearch() {
  historySearch = '';
  const input = document.getElementById('histSearch');
  if (input) input.value = '';
  const clearBtn = document.getElementById('histClear');
  if (clearBtn) clearBtn.classList.remove('visible');
  if (historyCache) renderHistoryContent(historyCache);
}

const INSIGHTS_API = 'https://fnjjfnsdxibjbzldfgit.supabase.co/functions/v1/workout-insights';
let progressCache = null;      // cached API response
let aiInsightsCache = null;    // cached AI insights (separate from charts)
let progressLoading = false;
let aiLoading = false;
let selectedExercise = null;   // for sparkline focus

async function renderProgressView() {
  const scroll = document.getElementById('mainScroll');
  scroll.innerHTML = `<div id="progContent"><div class="hist-loading"><span class="hist-spinner">📊</span>Loading your progress data…</div></div>`;
  scroll.scrollTop = 0;

  if (!progressCache) {
    await fetchProgressData();
  } else {
    buildProgressUI(progressCache);

}

async function fetchProgressData(force = false) {
  if (progressLoading) return;
  progressLoading = true;
  try {
    const url = force ? `${INSIGHTS_API}?force=1` : INSIGHTS_API;
    const res = await fetch(url);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'API error');
    progressCache = json;
    if (json.insights && !json.insights.parse_error) aiInsightsCache = json.insights;
    buildProgressUI(json);
  } catch(e) {
    const el = document.getElementById('progContent');
    if (el) el.innerHTML = `<div class="prog-error">⚠️ ${e.message}<br><br>
      <button onclick="fetchProgressData(true)" style="margin-top:6px;padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--white);cursor:pointer;font-family:'DM Sans',sans-serif">Retry</button></div>`;
  } finally {
    progressLoading = false;
  }
}

function buildProgressUI(data) {
  const el = document.getElementById('progContent');
  if (!el) return;

  const charts = data.charts || {};
  const exProgress = charts.exercise_progress || [];
  const weeklyVol = charts.weekly_volume || [];
  const bwTrend = charts.body_weight_trend || [];

  const bwChange = charts.bw_change_8_weeks;
  const streak = charts.streak || 0;
  const totalWorkouts = data.total_workouts_analyzed || 0;

  // Set default selected exercise
  if (!selectedExercise && exProgress.length > 0) selectedExercise = exProgress[0].name;

  // KPI row
  const bwChangeNum = parseFloat(bwChange) || 0;
  const bwColor = bwChangeNum <= 0 ? 'green' : 'red';
  const bwSign = bwChangeNum <= 0 ? '▼' : '▲';

  let html = `
  <div class="prog-kpi-row">
    <div class="prog-kpi">
      <div class="prog-kpi-label">WORKOUTS</div>
      <div class="prog-kpi-val">${totalWorkouts}</div>
      <div class="prog-kpi-sub">last 8 weeks</div>
    </div>
    ${latestBW ? `<div class="prog-kpi ${bwColor}">
      <div class="prog-kpi-label">BODY WEIGHT</div>
      <div class="prog-kpi-val">${latestBW}</div>
      <div class="prog-kpi-sub">${bwChange ? `${bwSign}${Math.abs(bwChangeNum)} lbs` : 'lbs'}</div>
    </div>` : ''}
    <div class="prog-kpi purple">
      <div class="prog-kpi-label">STREAK</div>
      <div class="prog-kpi-val">${streak}</div>
      <div class="prog-kpi-sub">sessions</div>
    </div>
    <div class="prog-kpi gold">
      <div class="prog-kpi-label">EXERCISES</div>
      <div class="prog-kpi-val">${exProgress.length}</div>
      <div class="prog-kpi-sub">tracked</div>
    </div>
  </div>`;

  // Weekly volume bars
  if (weeklyVol.length > 0) {
    const maxVol = Math.max(...weeklyVol.map(w => w.volume));
    const recentWeeks = weeklyVol.slice(-8);
    const currentWeek = getCurrentISOWeek();
    html += `
    <div class="prog-section-label">WEEKLY VOLUME</div>
    <div class="prog-chart-card">
      <div class="prog-chart-title">Total Training Volume <span style="font-size:10px;color:var(--dim2);font-weight:400">lbs lifted × reps</span></div>
      <div class="vol-bars" id="volBars">
        ${recentWeeks.map(w => {
          const pct = maxVol > 0 ? Math.max(8, (w.volume / maxVol) * 100) : 8;
          const isCurrent = w.week === currentWeek;
          const shortWeek = w.week.replace(/^\d{4}-/, '');
          const kFormatted = w.volume >= 1000 ? (w.volume/1000).toFixed(0)+'k' : w.volume;
          return `<div class="vol-bar-wrap">
            <div class="vol-bar-val">${isCurrent ? kFormatted : ''}</div>
            <div class="vol-bar ${isCurrent?'current-week':''}" style="height:${pct}%"></div>
            <div class="vol-bar-label">${shortWeek}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Strength sparklines — exercise selector + chart
  if (exProgress.length > 0) {
    html += `
    <div class="prog-section-label">STRENGTH PROGRESS</div>
    <div class="prog-chart-card">
      <div class="prog-ex-selector" id="exSelector">
        ${exProgress.map(ex => {
          const shortName = ex.name.replace(/^(smith machine |cable |machine |lying |seated |standing )/i,'').slice(0,18);
          const badge = ex.is_plateaued ? ' ⚠️' : ex.has_hassan ? ' ⚡' : ex.is_compound ? ' 🔑' : ex.trend === 'up' ? ' ↑' : '';
          return `<button class="prog-ex-btn ${ex.name===selectedExercise?'active':''}" onclick="selectProgressEx('${ex.name.replace(/'/g,"\\'")}')">
            ${shortName}${badge}
          </button>`;
        }).join('')}
      </div>
      <div id="sparkContainer">${buildSparkline(exProgress.find(e => e.name === selectedExercise))}</div>
    </div>`;
  }

  // All exercises summary table
  if (exProgress.length > 0) {
    html += `
    <div class="prog-section-label">ALL EXERCISES</div>
    <div class="prog-chart-card">
      ${exProgress.map(ex => {
        const deltaNum = parseFloat(ex.pct_change) || 0;
        const deltaClass = ex.is_plateaued ? 'plateau' : deltaNum > 0 ? 'up' : 'flat';
        const deltaLabel = ex.is_plateaued ? '⚠️ PLATEAU' : deltaNum > 0 ? `+${ex.pct_change}%` : deltaNum < 0 ? `${ex.pct_change}%` : '—';
        const topWt = ex.history.length > 0 ? ex.history[ex.history.length-1].weight : 0;
        return `<div class="prog-ex-row">
          <span class="prog-ex-name">${ex.name}</span>
          <div class="prog-ex-right">
            <div class="prog-ex-wt">${topWt > 0 ? topWt + ' lbs' : '—'}</div>

  html += `
  <div class="prog-section-label">AI COACH INSIGHTS</div>
  <div id="aiInsightSection">${buildAICard(data)}</div>
  <div style="height:20px"></div>`;

  el.innerHTML = html;
}

function buildSparkline(ex) {
  if (!ex || !ex.history || ex.history.length < 2) {
    return `<div style="text-align:center;padding:20px;color:var(--dim2);font-size:12px">Not enough data yet — keep logging!</div>`;
  }
  const pts = ex.history;
  const weights = pts.map(p => p.weight).filter(w => w > 0);
  if (weights.length < 2) return `<div style="text-align:center;padding:20px;color:var(--dim2);font-size:12px">Weight data unavailable</div>`;

  const minW = Math.min(...weights);
  const maxW = Math.max(...weights);
  const range = maxW - minW || 1;
  const W = 280, H = 56, PAD = 6;

  const points = pts.filter(p => p.weight > 0).map((p, i, arr) => {
    const x = PAD + (i / (arr.length - 1)) * (W - PAD * 2);
    const y = H - PAD - ((p.weight - minW) / range) * (H - PAD * 2);
    return { x, y, p };
  });

  const pathD = points.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt.x.toFixed(1)} ${pt.y.toFixed(1)}`).join(' ');

  const dots = points.map((pt, i) => {
    const isLast = i === points.length - 1;
    return `<circle class="spark-dot${isLast?' last':''}" cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="${isLast?4:2.5}"/>`;
  }).join('');

  const first = pts.find(p => p.weight > 0);
  const last = [...pts].reverse().find(p => p.weight > 0);
  const pctNum = parseFloat(ex.pct_change);
  const pctLabel = pctNum > 0 ? `+${ex.pct_change}%` : `${ex.pct_change}%`;
  const pctColor = ex.is_plateaued ? 'var(--red)' : pctNum > 0 ? 'var(--green)' : 'var(--dim2)';

  return `
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
    <div>
      <div style="font-size:22px;font-weight:700;font-family:'Bebas Neue',sans-serif;">${last.weight} lbs</div>
      <div style="font-size:10px;color:var(--dim2);">current top set</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:18px;font-weight:700;font-family:'Bebas Neue',sans-serif;color:${pctColor}">${ex.is_plateaued ? '⚠️ PLATEAU' : pctLabel}</div>
      <div style="font-size:10px;color:var(--dim2);">${ex.sessions} sessions tracked</div>
    </div>
  </div>
  <div class="spark-wrap">
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <path class="spark-line" d="${pathD}"/>
      ${dots}
    </svg>
  </div>
  <div class="spark-labels">
    <span class="spark-label">${first.date}</span>
    <span class="spark-label">${last.date}</span>
  </div>`;
}

function buildAICard(data) {
  const insights = data.insights;
  const isCache = data.source === 'cache';
  const generatedAt = data.generated_at ? new Date(data.generated_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';

  // If no insights yet or parse error, show auto-generating state
  if (!insights || insights.parse_error) {
    // Kick off generation automatically if not already loading
    if (!aiLoading) setTimeout(() => generateAIInsights(false), 100);
    return `<div class="ai-insight-card">
      <div class="ai-insight-header">
        <div class="ai-insight-title">🤖 AI COACH ANALYSIS</div>
      </div>
      <div class="ai-loading"><span class="ai-spinner">🧠</span>Analyzing your training data…</div>
    </div>`;
  }

  return `<div class="ai-insight-card">
    <div class="ai-insight-header">
      <div class="ai-insight-title">🤖 AI COACH ANALYSIS</div>
      <div class="ai-insight-meta">${isCache ? '💾 CACHED · ' : '✨ FRESH · '}${generatedAt}</div>
    </div>

    ${insights.wins?.length ? `
    <div class="ai-section">
      <div class="ai-section-label wins">🏆 PERFORMANCE WINS</div>
      ${insights.wins.map(w => `<div class="ai-item"><span class="ai-item-icon">✅</span><span class="ai-item-text">${w}</span></div>`).join('')}
    </div>` : ''}

    ${insights.priorities?.length ? `
    <div class="ai-section">
      <div class="ai-section-label priorities">🎯 PRIORITY EXERCISES NEXT WEEK</div>
      ${insights.priorities.map(p => `<div class="ai-item"><span class="ai-item-icon">💪</span><span class="ai-item-text"><strong style="color:var(--white)">${p.exercise}</strong> — ${p.reason}</span></div>`).join('')}
    </div>` : ''}

    ${insights.plateau_alert ? `

function getCurrentISOWeek() {
  const d = new Date();
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const startOfWeek1 = new Date(jan4);
  startOfWeek1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const weekNum = Math.ceil(((d.getTime() - startOfWeek1.getTime()) / 86400000 + 1) / 7);
  return `${d.getFullYear()}-W${String(weekNum).padStart(2,'0')}`;
}

// Wake Lock — keeps screen alive during active sprint timer
let sprintWakeLock = null;
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    sprintWakeLock = await navigator.wakeLock.request('screen');
    sprintWakeLock.addEventListener('release', () => { sprintWakeLock = null; });
  } catch(e) {}
}
function releaseWakeLock() {
  if (sprintWakeLock) { try { sprintWakeLock.release(); } catch(e) {} sprintWakeLock = null; }
}
// Re-acquire if page becomes visible again (e.g. user switches apps and back)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && sprintState.running) acquireWakeLock();
});

const SPRINT_PHASES = {
  warmup:   { label: 'WARM-UP WALK',  secs: 300, cue: 'Easy incline walk. Get the blood moving. Deep breaths.' },
  sprint:   { label: 'SPRINT — MAX EFFORT', secs: 30,  cue: 'LEAN HARD INTO THE BELT. Maximum effort. Drive your legs. Zone 5.' },
  rest:     { label: 'WALKING RECOVERY', secs: 90,  cue: 'Slow it down. Walk it out. Heart rate coming down to Zone 2 before next round.' },
  cooldown: { label: 'COOL-DOWN WALK', secs: 300, cue: 'Easy walk. Let heart rate drop below 120. Great work.' },
  done:     { label: 'SESSION COMPLETE', secs: 0,   cue: 'Head straight to the sauna. 20 min @ 175°F. Non-optional.' }
};

function buildRoundDots() {
  const container = document.getElementById('spRoundDots');
  if (!container) return;
  let html = '';
  for (let i = 1; i <= sprintState.totalRounds; i++) {
    const cls = i < sprintState.round ? 'done' : i === sprintState.round && sprintState.phase === 'sprint' ? 'active' : '';
    html += `<div class="sprint-round-dot ${cls}">${i}</div>`;
  }
  container.innerHTML = html;
}

function adjustRounds(delta) {
  if (sprintState.running) return;
  sprintState.totalRounds = Math.max(4, Math.min(10, sprintState.totalRounds + delta));
  const el = document.getElementById('spRoundsVal');
  if (el) el.textContent = sprintState.totalRounds;
  const cueEl = document.getElementById('spCue');
  if (cueEl) cueEl.textContent = `5-min warm-up → ${sprintState.totalRounds} × 30-sec sprints → 90-sec rest between → 5-min cool-down. Hit START when on the treadmill.`;
  buildRoundDots();
}

function toggleSprint() {
  if (sprintState.phase === 'done') { resetSprint(); return; }
  if (sprintState.phase === 'idle') {
    sprintState.phase = 'warmup';
    sprintState.elapsed = 0;
    sprintState.phaseDuration = SPRINT_PHASES.warmup.secs;
    sprintState.round = 0;
  }
  sprintState.running = !sprintState.running;
  const btn = document.getElementById('spMainBtn');
  if (btn) { btn.textContent = sprintState.running ? 'PAUSE' : 'RESUME'; btn.className = sprintState.running ? 'sprint-btn sprint-btn-main running' : 'sprint-btn sprint-btn-main'; }
  if (sprintState.running) {
    acquireWakeLock();
    sprintState.interval = setInterval(tickSprint, 1000);
  } else {
    releaseWakeLock();
    clearInterval(sprintState.interval);
  }
  updateSprintDisplay();
}

function tickSprint() {
  sprintState.elapsed++;
  if (sprintState.elapsed >= sprintState.phaseDuration) {
    advanceSprintPhase();
  }
  updateSprintDisplay();
}

function advanceSprintPhase() {
  sprintState.elapsed = 0;
  if (sprintState.phase === 'warmup') {
    sprintState.phase = 'sprint';
    sprintState.round = 1;
    sprintState.phaseDuration = SPRINT_PHASES.sprint.secs;
    vibrateDevice([200, 100, 200]);
  } else if (sprintState.phase === 'sprint') {
    if (sprintState.round >= sprintState.totalRounds) {
      sprintState.phase = 'cooldown';
      sprintState.phaseDuration = SPRINT_PHASES.cooldown.secs;
      vibrateDevice([100, 50, 100, 50, 100]);
    } else {
      sprintState.phase = 'rest';
      sprintState.phaseDuration = SPRINT_PHASES.rest.secs;
      vibrateDevice([300]);
    }
  } else if (sprintState.phase === 'rest') {
    sprintState.phase = 'sprint';
    sprintState.round++;
    sprintState.phaseDuration = SPRINT_PHASES.sprint.secs;
    vibrateDevice([200, 100, 200, 100, 200]);
  } else if (sprintState.phase === 'cooldown') {
    sprintState.phase = 'done';
    clearInterval(sprintState.interval);
    sprintState.running = false;
    releaseWakeLock();
    completeSprint();
    return;
  }
}

function vibrateDevice(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
}

function updateSprintDisplay() {
  const phase = sprintState.phase;
  if (phase === 'idle' || phase === 'done') return;
  const info = SPRINT_PHASES[phase];
  const remaining = Math.max(0, info.secs - sprintState.elapsed);
  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  const timeStr = `${mins}:${secs.toString().padStart(2,'0')}`;
  const progress = ((info.secs - remaining) / info.secs) * 100;

  const phaseClass = `phase-${phase === 'rest' ? 'rest' : phase === 'sprint' ? 'sprint' : phase === 'warmup' ? 'warmup' : 'cooldown'}`;
  const fillClass = `fill-${phase === 'rest' ? 'rest' : phase === 'sprint' ? 'sprint' : phase === 'warmup' ? 'warmup' : 'cooldown'}`;

  const timeEl = document.getElementById('spTime');
  const labelEl = document.getElementById('spPhaseLabel');
  const cueEl = document.getElementById('spCue');
  const fillEl = document.getElementById('spProgressFill');

  if (timeEl) { timeEl.textContent = timeStr; timeEl.className = `sprint-time ${phaseClass}`; }
  if (labelEl) {
    let lbl = info.label;
    if (phase === 'sprint') lbl += ` — Round ${sprintState.round}/${sprintState.totalRounds}`;
    if (phase === 'rest') lbl += ` — Next: Round ${sprintState.round + 1}`;
    labelEl.textContent = lbl;
    labelEl.className = `sprint-phase-label ${phaseClass}`;
  }
  if (cueEl) cueEl.textContent = info.cue;
  if (fillEl) { fillEl.style.width = (100 - progress) + '%'; fillEl.className = `sprint-progress-fill ${fillClass}`; }
  buildRoundDots();
}

function completeSprint() {
  const timeEl = document.getElementById('spTime');
  const labelEl = document.getElementById('spPhaseLabel');
  const cueEl = document.getElementById('spCue');
  const fillEl = document.getElementById('spProgressFill');
  const btn = document.getElementById('spMainBtn');
  const doneBanner = document.getElementById('spDoneBanner');
  const hrCard = document.getElementById('spHrCard');

  if (timeEl) { timeEl.textContent = '0:00'; timeEl.className = 'sprint-time phase-done'; }
  if (labelEl) { labelEl.textContent = 'SESSION COMPLETE ✓'; labelEl.className = 'sprint-phase-label phase-done'; }
  if (cueEl) cueEl.textContent = 'Head straight to the sauna. 20 min @ 175°F. Non-optional.';
  if (fillEl) { fillEl.style.width = '100%'; fillEl.className = 'sprint-progress-fill fill-rest'; }
  if (btn) { btn.textContent = 'RESET'; btn.className = 'sprint-btn sprint-btn-main'; }
  if (doneBanner) doneBanner.style.display = 'block';
  if (hrCard) hrCard.style.display = 'block';
  buildRoundDots();
  vibrateDevice([300, 100, 300, 100, 300]);
}

function resetSprint() {
  clearInterval(sprintState.interval);
  releaseWakeLock();
  sprintState = { running: false, phase: 'idle', round: 0, totalRounds: sprintState.totalRounds, elapsed: 0, phaseDuration: 0, interval: null };
  const btn = document.getElementById('spMainBtn');
  if (btn) { btn.textContent = 'START'; btn.className = 'sprint-btn sprint-btn-main'; }
  const doneBanner = document.getElementById('spDoneBanner');
  if (doneBanner) doneBanner.style.display = 'none';
  const hrCard = document.getElementById('spHrCard');
  if (hrCard) hrCard.style.display = 'none';
  const timeEl = document.getElementById('spTime');
  if (timeEl) { timeEl.textContent = '5:00'; timeEl.className = 'sprint-time phase-warmup'; }
  const labelEl = document.getElementById('spPhaseLabel');
  if (labelEl) { labelEl.textContent = 'READY TO START'; labelEl.className = 'sprint-phase-label phase-warmup'; }
  const cueEl = document.getElementById('spCue');
  if (cueEl) cueEl.textContent = `5-min warm-up → ${sprintState.totalRounds} × 30-sec sprints → 90-sec rest between → 5-min cool-down. Hit START when on the treadmill.`;
  const fillEl = document.getElementById('spProgressFill');
  if (fillEl) { fillEl.style.width = '100%'; fillEl.className = 'sprint-progress-fill fill-warmup'; }
  buildRoundDots();
}

  const badgeEl = document.getElementById('tTypeBadge');
  if (badgeEl) {
    const typeInfo = getRestTypeLabel(timerSec);
    badgeEl.textContent = typeInfo.label + ' · ' + formatTimerLabel(timerSec);
    badgeEl.className = 't-type-badge ' + typeInfo.cls;
    badgeEl.style.display = 'inline-flex';
  }

  // Next set target block
  const targetEl = document.getElementById('tNextTarget');
  const targetValEl = document.getElementById('tNextTargetVal');
  if (targetEl && targetValEl) {
    if (nextTargetText) {
      targetValEl.textContent = nextTargetText;
      targetEl.classList.add('visible');
    } else {
      targetEl.classList.remove('visible');
    }
  }
  
  // Next info
  const nextEl = document.getElementById('tNext');
  if (nextInfoOverride) {
    nextEl.innerHTML = nextInfoOverride;
  } else if (nextName) {
    nextEl.innerHTML = `Up next: <strong>${nextName}</strong>`;
  } else {
    nextEl.innerHTML = `<strong>Last one — finish strong!</strong>`;
  }
  
  updateTimerDisplay();
  document.getElementById('timerOverlay').classList.add('visible');
  timerInterval = setInterval(() => {
    timerSec--;
    updateTimerDisplay();
    if (timerSec <= 0) {
      clearInterval(timerInterval);
      playBeep();
      setTimeout(() => closeTimer(), 700);
    }
  }, 1000);
}

function formatTimerLabel(sec) {
  if (sec < 60) return sec + 's';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return s === 0 ? m + ':00' : m + ':' + String(s).padStart(2, '0');
}

function updateTimerDisplay() {
  const s = Math.max(0, timerSec);
  document.getElementById('tDisplay').textContent = s;
  // Sync pill
  const pd = document.getElementById('pillDisplay');
  if (pd) pd.textContent = s < 60 ? s : Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
  // Main ring
  const ring = document.getElementById('ringFill');
  ring.style.strokeDashoffset = CIRC * (1 - timerSec / timerMax);
  ring.classList.toggle('urgent', timerSec <= 10);
  // Pill ring (dasharray=75.4 for r=12)
  const pillRing = document.getElementById('pillRingFill');
  if (pillRing) {
    const PILL_CIRC = 2 * Math.PI * 12;
    pillRing.style.strokeDashoffset = PILL_CIRC * (1 - timerSec / timerMax);
    pillRing.classList.toggle('urgent', timerSec <= 10);
  }
}

function minimizeTimer() {
  document.getElementById('timerOverlay').classList.add('minimized');
  // Set pill label to current exercise name
  const exName = document.getElementById('tExName').textContent.replace('✓ ','');
  const pill = document.getElementById('pillLabel');
  if (pill) pill.textContent = exName || 'Resting…';
}

function expandTimer() {
  document.getElementById('timerOverlay').classList.remove('minimized');
}

function adjTimer(d) {
  timerSec = Math.max(0, timerSec + d);
  timerMax = Math.max(timerMax, timerSec);
  updateTimerDisplay();
}

function closeTimer() {
  clearInterval(timerInterval);
  document.getElementById('timerOverlay').classList.remove('visible');
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [[0,660],[150,660],[300,880]].forEach(([d,f]) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f;
      g.gain.setValueAtTime(0.3, ctx.currentTime + d/1000);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d/1000 + 0.25);
      o.start(ctx.currentTime + d/1000);
      o.stop(ctx.currentTime + d/1000 + 0.3);
    });
  } catch(e) {}
}

// ============================================================
// UTILITIES

function showToast(msg, isGold) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isGold ? ' gold-toast' : '') + ' visible';
  setTimeout(() => el.classList.remove('visible'), 2800);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
}
