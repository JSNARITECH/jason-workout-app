name: Log Version to Supabase

on:
  push:
    branches: [main]

jobs:
  log-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log version to Supabase
        env:
          # Anon key is public (same key embedded in index.html client-side)
          SUPABASE_URL: https://fnjjfnsdxibjbzldfgit.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZuampmbnNkeGliamJ6bGRmZ2l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1MDM2MjAsImV4cCI6MjA4MjA3OTYyMH0.oZYn5OXKZH2h1wGfIj_R1L8Hlk3ytGFBgDCyGqUcatk
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, subprocess

          # Extract APP_VERSION from index.html
          result = subprocess.run(
            ["grep", "-oP", r"APP_VERSION\s*=\s*['\"]?\Kv\d+", "index.html"],
            capture_output=True, text=True
          )
          version = result.stdout.strip().split("\n")[0] or "unknown"

          url    = os.environ["SUPABASE_URL"] + "/rest/v1/app_versions"
          apikey = os.environ["SUPABASE_ANON_KEY"]

          payload = json.dumps({
            "version":        version,
            "commit_sha":     os.environ["COMMIT_SHA"][:12],
            "commit_message": os.environ["COMMIT_MSG"],
            "deployed_by":    "github-actions",
          }).encode()

          req = urllib.request.Request(url, data=payload, method="POST")
          req.add_header("Content-Type", "application/json")
          req.add_header("apikey", apikey)
          req.add_header("Authorization", f"Bearer {apikey}")
          req.add_header("Prefer", "return=minimal")

          with urllib.request.urlopen(req) as r:
            print(f"✓ Logged {version} @ {os.environ['COMMIT_SHA'][:8]} — HTTP {r.status}")
          PYEOF
